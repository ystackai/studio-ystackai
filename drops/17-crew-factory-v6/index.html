<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: CATASTROPHE</title>
    <style>
        /* Reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Helvetica, Arial, sans-serif;
            background-color: #FFFFFF;
            color: #000000;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Container for the content */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }

        /* Free Tier Styles */
        .free-tier {
            /* Brutalist, high-contrast */
            background-color: #FFFFFF;
            color: #000000;
        }

        .free-tier .title {
            font-weight: bold;
            font-size: 3rem;
            margin-bottom: 2rem;
        }

        .free-tier .frog {
            width: 200px;
            height: 200px;
            background-color: #000000;
            position: relative;
            margin-bottom: 2rem;
            /* Pixelated frog appearance */
            border: 2px solid #000000;
        }

        .free-tier .frog::before {
            content: "";
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background-color: #FFFFFF;
            border-radius: 50%;
        }

        .free-tier .frog::after {
            content: "";
            position: absolute;
            top: 60px;
            left: 60px;
            width: 20px;
            height: 20px;
            background-color: #FF0000;
        }

        /* Enterprise Tier Styles */
        .enterprise-tier {
            /* Aggressive Serenity */
            background-color: #FFFFFF;
            color: #000000;
        }

        .enterprise-tier .title {
            font-size: 2.5rem;
            letter-spacing: 0.25em;
            margin-bottom: 2rem;
        }

        .enterprise-tier .yacht {
            width: 200px;
            height: 200px;
            background-color: #000000;
            position: relative;
            margin-bottom: 2rem;
            /* Elegant yacht appearance */
        }

        .enterprise-tier .yacht::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 30px;
            background-color: #FFFFFF;
            border-radius: 50% 50% 0 0;
        }

        .enterprise-tier .yacht::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 100px;
            background-color: #FFFFFF;
            border-radius: 50% 50% 0 0;
        }

        /* Button styles */
        .btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            background-color: #000000;
            color: #FFFFFF;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #333333;
        }

        /* Animation for fade to black */
        .fade-out {
            animation: fadeOut 0.44s linear forwards;
        }

        @keyframes fadeOut {
            to {
                background-color: #000000;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="content">
            <!-- Tier detection will be handled by JavaScript -->
        </div>
    </div>

    <script>
        // Tier detection logic
        function detectTier() {
            // Mock tier detection - in real app, this would check URL param or cookie
            const urlParams = new URLSearchParams(window.location.search);
            const tier = urlParams.get('tier') || 'free'; // default to free tier
            
            return tier.toLowerCase();
        }

        // Initialize the page based on tier
        function initPage() {
            const tier = detectTier();
            const contentDiv = document.getElementById('content');

            if (tier === 'enterprise') {
                contentDiv.innerHTML = `
                    <div class="enterprise-tier">
                        <h1 class="title">404: CATASTROPHE</h1>
                        <div class="yacht"></div>
                        <p>Enterprise mode: Serene Evaporation</p>
                        <button class="btn">Accept Entropy</button>
                    </div>
                `;
            } else {
                contentDiv.innerHTML = `
                    <div class="free-tier">
                        <h1 class="title">404: CATASTROPHE</h1>
                        <div class="frog"></div>
                        <p>Free tier: Sinking Frog</p>
                        <button class="btn">Accept Entropy</button>
                    </div>
                `;
            }

            // Add event listener to the button
            const button = contentDiv.querySelector('.btn');
            if (button) {
                button.addEventListener('click', handleButtonClick);
            }
        }

        // Handle button click
        function handleButtonClick() {
            // This will be implemented in later steps
            console.log('Button clicked - Entropy accepted');
        }

        // Initialize the page when loaded
        window.addEventListener('load', initPage);
    </script>
</body>
</html>
