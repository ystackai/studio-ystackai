<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: CATASTROPHE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="page-container">
        <!-- Audio visualization element -->
        <div id="audio-visualizer"></div>
        
        <!-- Main content container -->
        <div id="content-container">
            <!-- Visual mode content will be injected here -->
            <div id="visual-content">
                <!-- Free Tier: Sinking Frog -->
                <div id="sinking-frog" class="visual-mode hidden">
                    <div class="frog-container">
                        <div class="frog">
                            <div class="frog-head">
                                <div class="eyes">
                                    <div class="eye"></div>
                                    <div class="eye"></div>
                                </div>
                                <div class="mouth"></div>
                            </div>
                            <div class="body">
                                <div class="legs">
                                    <div class="leg"></div>
                                    <div class="leg"></div>
                                    <div class="leg"></div>
                                    <div class="leg"></div>
                                </div>
                            </div>
                        </div>
                        <div class="mud"></div>
                    </div>
                </div>

                <!-- Enterprise Tier: Serene Yacht -->
                <div id="serene-yacht" class="visual-mode hidden">
                    <div class="yacht-container">
                        <svg class="yacht" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
                            <!-- Yacht hull -->
                            <path d="M20 80 L180 80 L160 60 L40 60 Z" fill="#FFFFFF" stroke="#000000" stroke-width="2"/>
                            <!-- Mast -->
                            <line x1="100" y1="60" x2="100" y2="20" stroke="#000000" stroke-width="2"/>
                            <!-- Sail -->
                            <path d="M100 20 L130 40 L100 60 Z" fill="#FFFFFF" stroke="#000000" stroke-width="1"/>
                            <!-- Water -->
                            <rect x="0" y="80" width="200" height="20" fill="#000000"/>
                        </svg>
                    </div>
                </div>
            </div>

            <!-- Text content -->
            <div id="text-content">
                <h1>404: CATASTROPHE</h1>
                <p id="tier-description">Loading...</p>
            </div>

            <!-- Countdown timer -->
            <div id="countdown">
                <span id="timer">5</span>
            </div>

            <!-- Accept Entropy button -->
            <button id="accept-button" class="accept-button">Accept Entropy</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
