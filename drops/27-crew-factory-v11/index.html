<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Inevitable Sink</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
        }

        #container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #frog-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
        }

        #frog {
            width: 100%;
            height: 100%;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 120px;
            text-align: center;
            opacity: 0.8;
        }

        #accept-button {
            position: absolute;
            top: 70%;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 16px;
        }

        #accept-button:hover {
            background: #fff;
            color: #000;
        }
        
        #credit-score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 16px;
            opacity: 0.7;
        }
        
        #pulse-pixel {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 4px;
            height: 4px;
            background-color: white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="frog-container">
            <svg id="frog" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
                <!-- Vector frog - simple geometric design -->
                <circle cx="100" cy="100" r="50" fill="none" stroke="white" stroke-width="2"/>
                <circle cx="80" cy="90" r="5" fill="white"/>
                <circle cx="120" cy="90" r="5" fill="white"/>
                <path d="M80 120 Q100 140 120 120" fill="none" stroke="white" stroke-width="2"/>
                <rect x="70" y="130" width="60" height="10" fill="none" stroke="white" stroke-width="2"/>
            </svg>
        </div>
        <div id="message">404</div>
        <button id="accept-button">Accept Entropy</button>
        <div id="credit-score-display">Credit Score: 850</div>
        <div id="pulse-pixel"></div>
    </div>

    <script>
        // Credit score simulation and animation logic
        document.addEventListener('DOMContentLoaded', function() {
            const frog = document.getElementById('frog');
            const button = document.getElementById('accept-button');
            const container = document.getElementById('container');
            const creditScoreDisplay = document.getElementById('credit-score-display');
            const pulsePixel = document.getElementById('pulse-pixel');
            
            // Initialize credit score
            let creditScore = 850;
            let isAnimating = false;
            
            // Fibonacci decay parameters (1.333 decay curve)
            const decayFactor = 1.333;
            let frogY = 0;
            let initialFrogY = 0;
            let startTime = null;
            
            // Function to simulate real-time credit score changes
            function updateCreditScore() {
                // Simulate credit score dropping over time
                creditScore = Math.max(300, creditScore - Math.random() * 0.5);
                creditScoreDisplay.textContent = 'Credit Score: ' + Math.floor(creditScore);
                
                // Update font size based on credit score
                const fontSize = Math.max(20, 120 - (850 - creditScore) / 10);
                document.getElementById('message').style.fontSize = fontSize + 'px';
                
                // Update frog sinking animation based on credit score
                if (!isAnimating) {
                    isAnimating = true;
                    startTime = performance.now();
                    animateFrog();
                }
            }
            
            // Function to implement Fibonacci decay curve (1.333)
            function animateFrog() {
                const now = performance.now();
                const elapsed = (now - startTime) / 1000; // Convert to seconds
                
                // Apply Fibonacci decay curve (1.333)
                frogY = initialFrogY + Math.pow(elapsed, decayFactor) * 100;
                
                // Apply the frog's vertical position
                frog.style.transform = 'translate(-50%, calc(-50% + ' + frogY + 'px))';
                
                // Continue animation if still within bounds
                if (frogY < 500) { // Prevent excessive sinking
                    requestAnimationFrame(animateFrog);
                } else {
                    isAnimating = false;
                }
            }
            
            // Set up periodic credit score updates
            setInterval(updateCreditScore, 100);
            
            // Button click handling
            button.addEventListener('click', function() {
                // Auto-click trap - immediately click it back
                button.click();
            });
            
            // Golden ratio pulsing pixel effect
            let pulseState = 0;
            function pulsePixelEffect() {
                pulseState = (pulseState + 1) % 100;
                
                // Golden ratio (phi) = 1.618
                const pulseInterval = 1.618 * 100; // Scale to 100ms interval
                const opacity = Math.abs(Math.sin(pulseState / pulseInterval * Math.PI));
                
                pulsePixel.style.opacity = opacity;
                
                requestAnimationFrame(pulsePixelEffect);
            }
            
            pulsePixelEffect();
        });
    </script>
</body>
</html>
