<!DOCTYPE html>
<html lang="en" id="elegant-sink">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: The Elegant Sink</title>
    <style>
        /* Brutalist monochrome aesthetic with 1.618 ratio */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Courier New', monospace, sans-serif;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Golden ratio layout */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Frog element */
        .frog {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* Audio visualization */
        .audio-visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Accept entropy checkbox */
        .accept-entropy {
            position: absolute;
            bottom: 50%;
            transform: translateY(50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Hide scrollbar */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Prevent text selection */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Animation keyframes for frog sinking */
        @keyframes sink {
            0% {
                transform: translateX(-50%) translateY(0px);
            }
            100% {
                transform: translateX(-50%) translateY(calc(100vh - 16px));
            }
        }

        /* Animation for checkbox pulse */
        @keyframes pulse {
            0% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.5;
            }
        }

        /* Animation for fade to black */
        @keyframes fadeToBlack {
            0% {
                background-color: #FFFFFF;
            }
            90% {
                background-color: #FFFFFF;
            }
            100% {
                background-color: #000000;
            }
        }

        /* Animation for frog sinking with 1.333 decay curve */
        @keyframes sinkWithDecay {
            0% {
                transform: translateX(-50%) translateY(0px);
            }
            25% {
                transform: translateX(-50%) translateY(calc(100vh * 0.25 * 1.333));
            }
            50% {
                transform: translateX(-50%) translateY(calc(100vh * 0.5 * 1.333));
            }
            75% {
                transform: translateX(-50%) translateY(calc(100vh * 0.75 * 1.333));
            }
            100% {
                transform: translateX(-50%) translateY(calc(100vh - 16px));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img id="frog" class="frog" src="data:image/png;base64,iVBORw0KGgoA234123" alt="Pixelated Frog">
        <div class="audio-visualizer" id="audioVisualizer"></div>
        <input type="checkbox" class="accept-entropy" id="acceptEntropy">
        <label for="acceptEntropy">I Accept Inevitable Data Entropy</label>
    </div>

    <script>
        // Audio context initialization
        let audioContext;
        let sawtoothOscillator;
        let sineOscillator;
        let gainNode;
        let subBassGainNode;
        let startTime;
        let frogElement;
        let acceptCheckbox;
        let audioVisualizer;
        let sinkAnimation;
        let fadeToBlackAnimation;
        let fadeToBlackTimeout;
        let sinkComplete = false;

        // Set up the page elements
        document.addEventListener('DOMContentLoaded', function() {
            frogElement = document.getElementById('frog');
            acceptCheckbox = document.getElementById('acceptEntropy');
            audioVisualizer = document.getElementById('audioVisualizer');
        });

        // Initialize audio context on first user interaction
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                startTime = audioContext.currentTime;

                // Create sawtooth oscillator for main drone
                sawtoothOscillator = audioContext.createOscillator();
                sawtoothOscillator.type = 'sawtooth';
                sawtoothOscillator.frequency.value = 440; // Base frequency

                // Create sine oscillator for sub-bass
                sineOscillator = audioContext.createOscillator();
                sineOscillator.type = 'sine';
                sineOscillator.frequency.value = 16; // 16Hz sub-bass

                // Create gain nodes
                gainNode = audioContext.createGain();
                subBassGainNode = audioContext.createGain();

                // Connect nodes
                sawtoothOscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                sineOscillator.connect(subBassGainNode);
                subBassGainNode.connect(audioContext.destination);

                // Start oscillators
                sawtoothOscillator.start();
                sineOscillator.start();

                // Set initial gain values
                gainNode.gain.value = 0.1;
                subBassGainNode.gain.value = 0;

                console.log("Audio initialized with sawtooth drone and sub-bass layer");
            }
        }

        // Start the sink animation and audio
        function startSink() {
            // Initialize audio on first user interaction
            initAudio();

            // Apply the sink animation with decay curve
            frogElement.style.animation = 'sinkWithDecay 4s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards';

            // Start modulation of the drone
            startDroneModulation();

            // Add sub-bass at 3 seconds
            setTimeout(() => {
                subBassGainNode.gain.value = 0.3;
            }, 3000);

            // Set up fade to black when sink is complete
            setTimeout(() => {
                sinkComplete = true;
                document.body.style.animation = 'fadeToBlack 2s forwards';
                // Stop audio after fade
                setTimeout(() => {
                    if (sawtoothOscillator) {
                        sawtoothOscillator.stop();
                    }
                    if (sineOscillator) {
                        sineOscillator.stop();
                    }
                }, 2000);
            }, 4000);

            // Show the checkbox after 4 seconds
            setTimeout(() => {
                acceptCheckbox.style.opacity = '1';
                acceptCheckbox.style.animation = 'pulse 0.75s infinite';
            }, 4000);
        }

        // Start drone modulation - frequency drops by perfect fourth every second
        function startDroneModulation() {
            let modulationInterval = setInterval(() => {
                if (sawtoothOscillator && audioContext) {
                    let now = audioContext.currentTime;
                    let currentFreq = sawtoothOscillator.frequency.value;
                    // Drop by a perfect fourth (3/4 ratio)
                    let newFreq = currentFreq * 0.75;
                    sawtoothOscillator.frequency.setValueAtTime(newFreq, now);

                    // Increase gain to induce ear fatigue
                    let currentGain = gainNode.gain.value;
                    gainNode.gain.setValueAtTime(currentGain + 0.05, now);
                }
            }, 1000);
        }

        // Handle checkbox interaction
        acceptCheckbox.addEventListener('change', function() {
            if (this.checked) {
                // Play cha-ching sound
                playChaChing();

                // Fade back to white
                document.body.style.animation = 'fadeToBlack 2s forwards';

                // Return to home page after delay
                setTimeout(() => {
                    window.location.href = '/';
                }, 2000);
            } else {
                // If unchecked, remain in black silence forever
                document.body.style.backgroundColor = '#000000';
            }
        });

        // Play the cha-ching sound
        function playChaChing() {
            if (audioContext) {
                const squareOscillator = audioContext.createOscillator();
                const chaChingGain = audioContext.createGain();

                squareOscillator.type = 'square';
                squareOscillator.frequency.value = 880; // Higher pitch for cha-ching

                chaChingGain.gain.value = 0.01; // -60dB level as specified

                squareOscillator.connect(chaChingGain);
                chaChingGain.connect(audioContext.destination);

                // Apply attack and decay
                const now = audioContext.currentTime;
                chaChingGain.gain.setValueAtTime(0, now);
                chaChingGain.gain.linearRampToValueAtTime(0.01, now + 0.01); // Attack
                chaChingGain.gain.exponentialRampToValueAtTime(0.0001, now + 0.3); // Decay

                squareOscillator.start(now);
                squareOscillator.stop(now + 0.3);
            }
        }

        // Start the animation on any user interaction
        document.addEventListener('click', startSink);
        document.addEventListener('keydown', startSink);
    </script>
</body>
</html>
