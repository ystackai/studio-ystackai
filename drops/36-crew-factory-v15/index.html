<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Elegant Sink</title>
    <style>
        /* Swiss Grid Brutalism meets Hostile FinTech */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #FFFFFF;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            grid-template-rows: repeat(12, 1fr);
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .grid-line {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .vertical {
            width: 1px;
            height: 100%;
            left: 0;
            top: 0;
        }

        .horizontal {
            width: 100%;
            height: 1px;
            left: 0;
            top: 0;
        }

        .frog-container {
            grid-column: 6;
            grid-row: 6;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            transform: scale(1);
            transition: transform 0.3s ease;
        }

        .frog {
            width: 100px;
            height: 75px;
            background-color: #FFFFFF;
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%, 25% 75%, 75% 75%);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .frog::before {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #000000;
            border-radius: 50%;
            top: 20px;
            left: 20px;
        }

        .frog::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            background-color: #000000;
            border-radius: 50%;
            top: 20px;
            right: 20px;
        }

        .text-container {
            grid-column: 1 / -1;
            grid-row: 11;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 24px;
            transition: font-size 0.3s ease;
        }

        .terms-button {
            grid-column: 6;
            grid-row: 7;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px 20px;
            background-color: #000000;
            border: 1px solid #FFFFFF;
            color: #FFFFFF;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            position: relative;
            overflow: hidden;
        }

        .terms-button:hover {
            background-color: #FF3333;
            color: #000000;
        }

        .terms-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .terms-button:hover::before {
            left: 100%;
        }

        .sink-animation {
            animation: sink 440ms cubic-bezier(0.0, 0.029, 0.029, 0.059) forwards;
        }

        @keyframes sink {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(100vh);
            }
        }

        .void {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.1s ease;
        }

        .fade-to-black {
            opacity: 1 !important;
        }
    </style>
</head>
<body>
    <div class="grid" id="grid">
        <!-- Grid lines will be generated by JS -->
    </div>

    <div class="frog-container" id="frogContainer">
        <div class="frog" id="frog"></div>
    </div>

    <div class="text-container" id="textContainer">
        <p>404 - PAGE NOT FOUND</p>
    </div>

    <div class="terms-button" id="termsButton">
        ACCEPT TERMS
    </div>

    <div class="void" id="void"></div>

    <script>
        // Debt tier logic simulation
        function getDebtTier() {
            // Simulate debt tier based on cookie or random
            const debtTiers = ['low', 'medium', 'high', 'extreme'];
            const debtTier = debtTiers[Math.floor(Math.random() * debtTiers.length)];
            
            // Set debt level in cookie for persistence
            document.cookie = `debtTier=${debtTier}; path=/`;
            
            return debtTier;
        }

        // Apply debt tier styling
        function applyDebtTier() {
            const debtTier = getDebtTier();
            const textContainer = document.getElementById('textContainer');
            const termsButton = document.getElementById('termsButton');
            const frog = document.getElementById('frog');

            // Adjust text size based on debt tier
            const baseFontSize = 24;
            let fontSize;

            switch(debtTier) {
                case 'low':
                    fontSize = baseFontSize;
                    break;
                case 'medium':
                    fontSize = baseFontSize * 0.8;
                    break;
                case 'high':
                    fontSize = baseFontSize * 0.6;
                    break;
                case 'extreme':
                    fontSize = baseFontSize * 0.4;
                    break;
                default:
                    fontSize = baseFontSize;
            }

            textContainer.style.fontSize = `${fontSize}px`;

            // Adjust button size based on debt tier
            const baseButtonSize = 1;
            let buttonScale;

            switch(debtTier) {
                case 'low':
                    buttonScale = baseButtonSize;
                    break;
                case 'medium':
                    buttonScale = baseButtonSize * 0.8;
                    break;
                case 'high':
                    buttonScale = baseButtonSize * 0.6;
                    break;
                case 'extreme':
                    buttonScale = baseButtonSize * 0.4;
                    break;
                default:
                    buttonScale = baseButtonSize;
            }

            termsButton.style.transform = `scale(${buttonScale})`;

            // Adjust frog size based on debt tier
            const baseFrogSize = 1;
            let frogScale;

            switch(debtTier) {
                case 'low':
                    frogScale = baseFrogSize;
                    break;
                case 'medium':
                    frogScale = baseFrogSize * 0.9;
                    break;
                case 'high':
                    frogScale = baseFrogSize * 0.8;
                    break;
                case 'extreme':
                    frogScale = baseFrogSize * 0.7;
                    break;
                default:
                    frogScale = baseFrogSize;
            }

            frog.style.transform = `scale(${frogScale})`;
        }

        // Initialize grid
        function initGrid() {
            const grid = document.getElementById('grid');
            const gridLines = 12;

            for (let i = 0; i < gridLines; i++) {
                // Vertical lines
                const verticalLine = document.createElement('div');
                verticalLine.className = 'grid-line vertical';
                verticalLine.style.left = `${(i / gridLines) * 100}%`;
                grid.appendChild(verticalLine);

                // Horizontal lines
                const horizontalLine = document.createElement('div');
                horizontalLine.className = 'grid-line horizontal';
                horizontalLine.style.top = `${(i / gridLines) * 100}%`;
                grid.appendChild(horizontalLine);
        // Initialize the page
        window.addEventListener("load", function() {
            initGrid();
            applyDebtTier();
            const audioEngine = new AudioEngine();
            audioEngine.playSequence();

            // Start the sink animation
            const frogContainer = document.getElementById(frogContainer);
            frogContainer.classList.add(sink-animation);

            // Add a slight delay to the fade to black to make sure it synchronizes with the audio
            setTimeout(() => {
                const voidElement = document.getElementById(void);
                voidElement.classList.add(fade-to-black);
            }, 440);
        });
        // Audio setup
        function setupAudio() {

            droneOscillator.type = sawtooth;
            droneOscillator.frequency.value = 55;

            droneGain.gain.value = 0.1;

            droneOscillator.connect(droneGain);
            droneGain.connect(audioContext.destination);

            droneOscillator.start();

            // Create oscillator for the tritone
            const tritoneOscillator = audioContext.createOscillator();
            const tritoneGain = audioContext.createGain();

            tritoneOscillator.type = sawtooth;
            tritoneOscillator.frequency.value = 440;

            tritoneGain.gain.value = 0.1;

            tritoneOscillator.connect(tritoneGain);
            tritoneGain.connect(audioContext.destination);

            // Set up the fade-to-black effect at 440ms
            setTimeout(() => {
                // Start tritone at 440ms
                tritoneOscillator.start();
                
                // Set up the G7 chord at 440ms
                const chordOscillators = [];
                const chordFrequencies = [392, 494, 587, 698]; // G7 chord frequencies

                for (let i = 0; i < chordFrequencies.length; i++) {
                    const osc = audioContext.createOscillator();
                    const gain = audioContext.createGain();

                    osc.type = square;
                    osc.frequency.value = chordFrequencies[i];

                    gain.gain.value = 0.1;

                    osc.connect(gain);
                    gain.connect(audioContext.destination);

                    chordOscillators.push({ oscillator: osc, gain: gain });
                }

                // Start the chord
                for (let i = 0; i < chordOscillators.length; i++) {
                    chordOscillators[i].oscillator.start();
                }

                // Fade to black at 440ms
                const voidElement = document.getElementById(void);
                voidElement.classList.add(fade-to-black);

                // Stop all audio after 1 second
                setTimeout(() => {
                    droneOscillator.stop();
                    tritoneOscillator.stop();

                    for (let i = 0; i < chordOscillators.length; i++) {
                        chordOscillators[i].oscillator.stop();
                    }
                }, 1000);
            }, 440);

            // Handle button hover
            const termsButton = document.getElementById(termsButton);
            termsButton.addEventListener(mouseenter, function() {
                // Calculate debt tier for hover effect
                const debtTier = getDebtTier();
                let hoverScale;

                switch(debtTier) {
                    case low:
                        hoverScale = 1.2;
                        break;
                    case medium:
                        hoverScale = 1.1;
                        break;
                    case high:
                        hoverScale = 1.05;
                        break;
                    case extreme:
                        hoverScale = 1.02;
                        break;
                    default:
                        hoverScale = 1.2;
                }

                this.style.transform = `scale(${hoverScale})`;
            });

            termsButton.addEventListener(mouseleave, function() {
                // Reset button size on mouse leave
                const debtTier = getDebtTier();
                const baseButtonSize = 1;
                let buttonScale;

                switch(debtTier) {
                    case low:
                        buttonScale = baseButtonSize;
                        break;
                    case medium:
                        buttonScale = baseButtonSize * 0.8;
                        break;
                    case high:
                        buttonScale = baseButtonSize * 0.6;
                        break;
                    case extreme:
                        buttonScale = baseButtonSize * 0.4;
                        break;
                    default:
                        buttonScale = baseButtonSize;
                }

                this.style.transform = `scale(${buttonScale})`;
            });
        }
