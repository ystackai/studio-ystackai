<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crew Factory — ystackai</title>
  <link rel="stylesheet" href="assets/styles/main.css">
</head>
<body>
  <div id="app">
    <header class="app-header">
      <h1>Crew Factory</h1>
      <nav>
        <a href="#dashboard">Dashboard</a>
        <a href="#crews">Crews</a>
        <a href="#discord">Discord</a>
        <a href="#management">Management</a>
      </nav>
    </header>
    
    <main class="app-main">
      <section id="dashboard">
        <h2>Dashboard</h2>
        <div class="stats">
          <div class="stat-card">
            <h3>Total Crews</h3>
            <p id="total-crews">0</p>
          </div>
          <div class="stat-card">
            <h3>Active Members</h3>
            <p id="active-members">0</p>
          </div>
          <div class="stat-card">
            <h3>Projects</h3>
            <p id="projects">0</p>
          </div>
        </div>
      </section>
      
      <section id="crews">
        <h2>Crews</h2>
        <div class="crew-list" id="crew-list">
          <!-- Crews will be populated here -->
        </div>
      </section>
      
      <section id="discord">
        <h2>Discord Integration</h2>
        <div class="discord-integration">
          <p>Connect your Discord account to collaborate with crew members.</p>
          <button id="discord-connect">Connect Discord</button>
        </div>
      </section>
      
      <section id="management">
        <h2>Brief Management</h2>
        <div class="brief-form">
          <h3>Create New Brief</h3>
          <form id="brief-form">
            <input type="text" id="brief-title" placeholder="Brief title" required>
            <textarea id="brief-description" placeholder="Brief description" required></textarea>
            <input type="date" id="brief-deadline" required>
            <button type="submit">Create Brief</button>
          </form>
        </div>
        <div class="brief-list" id="brief-list">
          <!-- Briefs will be populated here -->
        </div>
      </section>
    </main>
    
    <footer class="app-footer">
      <p>&copy; 2026 ystackai Crew Factory</p>
    </footer>
  </div>

  <script src="src/main.js"></script>
</body>
</html>
