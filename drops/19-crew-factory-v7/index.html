<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Tiered Tragedy Engine</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="error-container">
        <div id="free-tier" class="tier-container">
            <div class="frog-sink"></div>
            <div class="scream-text">Your data is screaming</div>
            <button id="accept-entropy-free" class="accept-button">Accept Entropy</button>
        </div>

        <div id="enterprise-tier" class="tier-container">
            <div class="yacht-sink"></div>
            <div class="chaching-text">Your data is fading</div>
            <button id="accept-entropy-enterprise" class="accept-button">Accept Entropy</button>
        </div>

        <div id="thank-you" class="thank-you-container" style="display: none;">
            <h1>Thank You</h1>
            <p>Your subscription has been processed.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
