<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tron</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Courier New',monospace;display:flex;align-items:center;justify-content:center;height:100vh;touch-action:none}
canvas{image-rendering:pixelated;border:1px solid #0ff3}
#ui{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
#score{position:absolute;top:16px;left:0;right:0;text-align:center;color:#0ff;font-size:14px;letter-spacing:0.2em;opacity:0.7}
#overlay{color:#0ff;text-align:center;transition:opacity 0.5s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(24px,5vw,42px);font-weight:400;letter-spacing:0.3em;text-shadow:0 0 20px #0ff,0 0 40px #08f;margin-bottom:8px}
#overlay p{font-size:13px;color:#08f;letter-spacing:0.15em;margin-bottom:24px}
#overlay .sub{font-size:11px;color:#0ff5;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:0.3}50%{opacity:0.8}}
.credit{position:absolute;bottom:12px;left:0;right:0;text-align:center;color:#0ff3;font-size:10px;letter-spacing:0.15em}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score"></div>
  <div id="overlay">
    <h1>TRON</h1>
    <p>light cycle arena</p>
    <span class="sub">tap or press any key</span>
  </div>
</div>
<div class="credit">ystackai</div>
<script>
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const CELL=6,COLS=100,ROWS=70;
canvas.width=COLS*CELL;canvas.height=ROWS*CELL;
canvas.style.width=Math.min(window.innerWidth-20,COLS*CELL)+'px';
canvas.style.height='auto';

const DIR={UP:{x:0,y:-1},DOWN:{x:0,y:1},LEFT:{x:-1,y:0},RIGHT:{x:1,y:0}};
const DIRS=[DIR.UP,DIR.RIGHT,DIR.DOWN,DIR.LEFT];
let grid,player,ai,gameOver,score,started=false,frame=0;

// Audio
let audioCtx;
function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(freq,dur,vol=0.1){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=freq;g.gain.setValueAtTime(vol,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+dur)}
function playMove(){beep(200+Math.random()*100,0.05,0.03)}
function playCrash(){beep(80,0.4,0.15);setTimeout(()=>beep(50,0.3,0.1),100)}
function playTurn(){beep(400,0.03,0.05)}

function reset(){
  grid=Array.from({length:ROWS},()=>new Uint8Array(COLS));
  player={x:20,y:Math.floor(ROWS/2),dir:DIR.RIGHT,trail:[],color:'#0ff',alive:true};
  ai={x:COLS-20,y:Math.floor(ROWS/2),dir:DIR.LEFT,trail:[],color:'#f0a',alive:true};
  gameOver=false;score=0;frame=0;
}

function isBlocked(x,y){return x<0||x>=COLS||y<0||y>=ROWS||grid[y][x]!==0}

function aiThink(){
  const a=ai,dirs=[...DIRS];
  // Prefer current direction, avoid walls
  dirs.sort((d1,d2)=>{
    const s1=isBlocked(a.x+d1.x,a.y+d1.y)?100:0;
    const s2=isBlocked(a.x+d2.x,a.y+d2.y)?100:0;
    // Prefer direction toward player
    const dx=player.x-a.x,dy=player.y-a.y;
    const t1=-(d1.x*dx+d1.y*dy);
    const t2=-(d2.x*dx+d2.y*dy);
    // Prefer current direction
    const c1=(d1===a.dir)?-5:0;
    const c2=(d2===a.dir)?-5:0;
    return(s1+t1+c1)-(s2+t2+c2);
  });
  // Look ahead — pick first non-blocked
  for(const d of dirs){
    if(!isBlocked(a.x+d.x,a.y+d.y)){
      // Also check 2 ahead to avoid traps
      if(!isBlocked(a.x+d.x*2,a.y+d.y*2)||Math.random()<0.3){
        a.dir=d;return;
      }
    }
  }
  a.dir=dirs[0];
}

function step(){
  if(gameOver)return;
  frame++;
  if(frame%3===0)aiThink();

  for(const bike of[player,ai]){
    if(!bike.alive)continue;
    grid[bike.y][bike.x]=bike===player?1:2;
    bike.trail.push({x:bike.x,y:bike.y});
    bike.x+=bike.dir.x;
    bike.y+=bike.dir.y;
    if(isBlocked(bike.x,bike.y)){bike.alive=false;playCrash()}
    else{playMove()}
  }
  if(!player.alive||!ai.alive){
    gameOver=true;
    if(player.alive&&!ai.alive)score++;
    document.getElementById('score').textContent=player.alive?'YOU WIN':'DEREZ';
    setTimeout(()=>{
      document.getElementById('score').textContent='';
      reset();
    },2000);
  }
}

function draw(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,canvas.width,canvas.height);
  // Grid glow
  ctx.strokeStyle='#0ff08';ctx.lineWidth=0.5;
  for(let x=0;x<COLS;x+=10){ctx.beginPath();ctx.moveTo(x*CELL,0);ctx.lineTo(x*CELL,ROWS*CELL);ctx.stroke()}
  for(let y=0;y<ROWS;y+=10){ctx.beginPath();ctx.moveTo(0,y*CELL);ctx.lineTo(COLS*CELL,y*CELL);ctx.stroke()}

  // Trails
  for(let y=0;y<ROWS;y++)for(let x=0;x<COLS;x++){
    if(grid[y][x]===1){ctx.fillStyle='#0ff';ctx.fillRect(x*CELL,y*CELL,CELL-1,CELL-1)}
    else if(grid[y][x]===2){ctx.fillStyle='#f0a';ctx.fillRect(x*CELL,y*CELL,CELL-1,CELL-1)}
  }

  // Bikes (brighter heads)
  if(player.alive){
    ctx.fillStyle='#fff';ctx.fillRect(player.x*CELL-1,player.y*CELL-1,CELL+2,CELL+2);
    ctx.shadowColor='#0ff';ctx.shadowBlur=10;
    ctx.fillStyle='#0ff';ctx.fillRect(player.x*CELL,player.y*CELL,CELL,CELL);
    ctx.shadowBlur=0;
  }
  if(ai.alive){
    ctx.fillStyle='#fff';ctx.fillRect(ai.x*CELL-1,ai.y*CELL-1,CELL+2,CELL+2);
    ctx.shadowColor='#f0a';ctx.shadowBlur=10;
    ctx.fillStyle='#f0a';ctx.fillRect(ai.x*CELL,ai.y*CELL,CELL,CELL);
    ctx.shadowBlur=0;
  }
}

function loop(){
  if(started&&!gameOver)step();
  draw();
  requestAnimationFrame(loop);
}

// Controls
function turn(dir){if(!started)return;if(dir.x!==-player.dir.x&&dir.y!==-player.dir.y){player.dir=dir;playTurn()}}
document.addEventListener('keydown',e=>{
  if(!started){start();return}
  if(e.key==='ArrowUp'||e.key==='w')turn(DIR.UP);
  if(e.key==='ArrowDown'||e.key==='s')turn(DIR.DOWN);
  if(e.key==='ArrowLeft'||e.key==='a')turn(DIR.LEFT);
  if(e.key==='ArrowRight'||e.key==='d')turn(DIR.RIGHT);
});

// Touch/swipe
let tx,ty;
canvas.addEventListener('pointerdown',e=>{
  if(!started){start();return}
  tx=e.clientX;ty=e.clientY;
});
canvas.addEventListener('pointerup',e=>{
  const dx=e.clientX-tx,dy=e.clientY-ty;
  if(Math.abs(dx)+Math.abs(dy)<15)return;
  if(Math.abs(dx)>Math.abs(dy)){turn(dx>0?DIR.RIGHT:DIR.LEFT)}
  else{turn(dy>0?DIR.DOWN:DIR.UP)}
});

function start(){
  initAudio();started=true;
  document.getElementById('overlay').classList.add('hidden');
  beep(440,0.1,0.08);setTimeout(()=>beep(660,0.15,0.08),120);
}

reset();loop();
</script>
</body>
</html>
