<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Grid</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Rhythm Grid</h1>
        <div class="grid-container">
            <div class="grid" id="rhythmGrid"></div>
        </div>
        <div class="controls">
            <button id="playButton">Play</button>
            <button id="stopButton">Stop</button>
            <button id="clearButton">Clear</button>
        </div>
        <div class="sequence-info">
            <p>Current Sequence: <span id="sequenceDisplay">0000000000000000</span></p>
            <p>Tempo: <span id="tempoDisplay">120</span> BPM</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
