<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sinking Frog: Hostile Acquisition 404</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            grid-template-rows: repeat(16, 1fr);
            width: 100vw;
            height: 100vh;
            gap: 0;
        }

        .grid-cell {
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .frog-container {
            grid-column: 8;
            grid-row: 8;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .frog {
            width: 100px;
            height: 100px;
            stroke: #fff;
            stroke-width: 2;
            fill: none;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 2rem;
            letter-spacing: 0.1em;
        }

        .button-container {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            display: none;
        }

        .accept-button {
            background: #000;
            color: #fff;
            border: 1px solid #fff;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .accept-button:hover {
            background: #fff;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>404</h1>
    </div>
    
    <div class="grid">
        <!-- Grid will be populated by JavaScript -->
    </div>
    
    <div class="frog-container">
        <svg class="frog" viewBox="0 0 100 100">
            <path d="M50 20 C60 10, 70 15, 75 25 C80 35, 75 45, 65 50 C70 55, 75 65, 70 75 C65 85, 55 90, 50 85 C45 90, 35 85, 30 75 C25 65, 30 55, 35 50 C25 45, 20 35, 25 25 C30 15, 40 10, 50 20 Z" />
        </svg>
    </div>
    
    <div class="button-container">
        <button class="accept-button">Accept Entropy</button>
    </div>

    <script>
        // Initialize the grid
        const grid = document.querySelector('.grid');
        for (let i = 0; i < 256; i++) {
            const cell = document.createElement('div');
            cell.className = 'grid-cell';
            grid.appendChild(cell);
        }

        // Fibonacci cubic-bezier curve for sink animation
        function generateFibonacciBezier(steps = 100) {
            // Generate Fibonacci sequence for curve control points
            let fib = [0, 1];
            for (let i = 2; i < steps; i++) {
                fib[i] = fib[i - 1] + fib[i - 2];
            }

            // Normalize to 0-1 range for CSS cubic-bezier
            const maxFib = Math.max(...fib);
            const normalized = fib.map(f => f / maxFib);

            // Take every 3rd element to get control points for cubic-bezier
            // We'll use 4 points for a cubic-bezier (0,0), (x1,y1), (x2,y2), (1,1)
            const points = [];
            for (let i = 0; i < normalized.length; i += 3) {
                if (i + 2 < normalized.length) {
                    points.push({
                        x: normalized[i],
                        y: normalized[i + 2]
                    });
                }
            }

            // Use first 3 points to define the cubic-bezier curve
            // We'll use the first point for x1,y1 and second point for x2,y2
            // The first point is (0,0) and last is (1,1) so we only need to define the middle two points
            if (points.length >= 2) {
                const p1 = points[0];
                const p2 = points[1];
                // Convert to CSS cubic-bezier format
                return `${p1.x}, ${p1.y}, ${p2.x}, ${p2.y}`;
            }

            // Fallback to a simple curve if we don't have enough data
            return '0.25, 0.1, 0.25, 1';
        }

        // Sink animation using requestAnimationFrame with Fibonacci timing
        function startSinkAnimation(frogElement, duration = 3000) {
            const startTime = performance.now();
            const totalDuration = duration;
            
            // Get the initial position
            const initialPosition = frogElement.getBoundingClientRect().top;
            const viewportHeight = window.innerHeight;
            const finalPosition = viewportHeight; // Bottom of viewport
            
            // Create Fibonacci-based timing function
            function fibonacciTiming(t) {
                // Simple approach: use a modified sine wave that approximates Fibonacci growth
                // This creates a curve that starts slow and accelerates, similar to Fibonacci sequence
                return Math.pow(t, 1.618); // Using golden ratio exponent
            }

            // Create animation function
            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / totalDuration, 1);
                
                // Apply Fibonacci-based easing
                const easedProgress = fibonacciTiming(progress);
                const position = initialPosition + (finalPosition - initialPosition) * easedProgress;
                
                // Apply the position transformation
                frogElement.style.transform = `translateY(${position - initialPosition}px)`;
                
                if (progress < 1) {
                    requestAnimationFrame(animate);
                }
            }

            // Start the animation
            requestAnimationFrame(animate);
        }

        // Audio trigger and synchronization
        function triggerAudio() {
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            
            // Create "cha-ching" sound
            function createChaChing() {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(220, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(440, audioContext.currentTime + 0.1);
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 0.1);
            }
            
            // Create sink sound (pitch-bent sawtooth)
            function createSinkSound() {
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(110, audioContext.currentTime);
                oscillator.frequency.linearRampToValueAtTime(880, audioContext.currentTime + 3);
                
                gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 3);
                
                oscillator.start(audioContext.currentTime);
            }
            
            // Create climax sound (G7 chord)
            function createClimax() {
                const oscillator1 = audioContext.createOscillator();
                const oscillator2 = audioContext.createOscillator();
                const oscillator3 = audioContext.createOscillator();
                const oscillator4 = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator1.connect(gainNode);
                oscillator2.connect(gainNode);
                oscillator3.connect(gainNode);
                oscillator4.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator1.type = 'sine';
                oscillator2.type = 'sine';
                oscillator3.type = 'sine';
                oscillator4.type = 'sine';
                
                // G7 chord (G, B, D, F)
                oscillator1.frequency.setValueAtTime(392, audioContext.currentTime); // G
                oscillator2.frequency.setValueAtTime(494, audioContext.currentTime); // B
                oscillator3.frequency.setValueAtTime(294, audioContext.currentTime); // D
                oscillator4.frequency.setValueAtTime(349, audioContext.currentTime); // F
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                
                oscillator1.start(audioContext.currentTime);
                oscillator2.start(audioContext.currentTime);
                oscillator3.start(audioContext.currentTime);
                oscillator4.start(audioContext.currentTime);
                
                oscillator1.stop(audioContext.currentTime + 0.5);
                oscillator2.stop(audioContext.currentTime + 0.5);
                oscillator3.stop(audioContext.currentTime + 0.5);
                oscillator4.stop(audioContext.currentTime + 0.5);
            }
            
            // Play sounds in sequence
            createChaChing();
            setTimeout(createSinkSound, 100);
            setTimeout(createClimax, 3000);
        }

        // Mock debt tier API
        function fetchDebtTier() {
            return new Promise((resolve, reject) => {
                // Simulate network delay
                setTimeout(() => {
                    // 80% chance of success
                    if (Math.random() > 0.2) {
                        // Return a mock debt tier
                        const tiers = ['A', 'B', 'C', 'D', 'E'];
                        const tier = tiers[Math.floor(Math.random() * tiers.length)];
                        resolve({ tier: tier, score: Math.floor(Math.random() * 1000) });
                    } else {
                        // Simulate timeout
                        reject(new Error('Network timeout'));
                    }
                }, 1000);
            });
        }

        // Initialize everything
        document.addEventListener('DOMContentLoaded', function() {
            const frogElement = document.querySelector('.frog-container');
            const bezierCurve = generateFibonacciBezier(100);
            console.log('Fibonacci Bezier Curve:', bezierCurve);

            // Fetch debt tier and trigger animations
            fetchDebtTier()
                .then(tier => {
                    console.log('Debt tier resolved:', tier);
                    triggerAudio();
                    setTimeout(() => {
                        startSinkAnimation(frogElement, 3000);
                    }, 100);
                })
                .catch(error => {
                    console.log('Debt tier fetch failed:', error);
                    // Even if it fails, still trigger audio and animation after a timeout
                    triggerAudio();
                    setTimeout(() => {
                        startSinkAnimation(frogElement, 3000);
                    }, 100);
                });
        });
    </script>
</body>
</html>
