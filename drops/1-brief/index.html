<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Drop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <header id="game-header">
            <h1>Next Drop</h1>
            <div id="game-stats">
                <span id="score">Score: 0</span>
                <span id="level">Level: 1</span>
                <span id="lives">Lives: 3</span>
            </div>
        </header>
        
        <main id="game-main">
            <div id="game-canvas-container">
                <canvas id="game-canvas"></canvas>
            </div>
            
            <div id="game-ui">
                <div id="start-screen" class="game-screen">
                    <h2>Ready to Drop?</h2>
                    <p>Assemble your crew and start the production line</p>
                    <button id="start-button">Start Production</button>
                </div>
                
                <div id="game-over-screen" class="game-screen hidden">
                    <h2>Production Complete</h2>
                    <p>Your crew has finished its task</p>
                    <p id="final-score">Score: 0</p>
                    <button id="restart-button">New Crew</button>
                </div>
                
                <div id="game-screen" class="game-screen hidden">
                    <div id="crew-status">
                        <h3>Crew Status</h3>
                        <div id="crew-members">Crew Members: 0</div>
                        <div id="crew-quality">Quality: 0%</div>
                    </div>
                </div>
            </div>
        </main>
        
        <footer id="game-footer">
            <p>Next Drop - Assembly Line Experience</p>
        </footer>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
