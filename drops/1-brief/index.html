<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Drop - Crew Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="factory-container">
        <!-- Factory Header -->
        <header class="factory-header">
            <h1>Next Drop</h1>
            <p class="subtitle">Create Your Own Crew</p>
        </header>

        <!-- Assembly Line Area -->
        <div class="assembly-line">
            <!-- Crew Creation Section -->
            <div class="crew-creation">
                <h2>Assemble Your Crew</h2>
                <div class="creation-controls">
                    <button id="createCrewBtn" class="primary-btn">Create Crew</button>
                    <button id="randomizeBtn" class="secondary-btn">Randomize</button>
                </div>
                <div class="crew-preview">
                    <div class="crew-member" id="crewMember1">
                        <div class="member-avatar">👨‍🚀</div>
                        <div class="member-name">Crew Member 1</div>
                    </div>
                    <div class="crew-member" id="crewMember2">
                        <div class="member-avatar">👩‍🚀</div>
                        <div class="member-name">Crew Member 2</div>
                    </div>
                    <div class="crew-member" id="crewMember3">
                        <div class="member-avatar">👨‍💻</div>
                        <div class="member-name">Crew Member 3</div>
                    </div>
                </div>
            </div>

            <!-- Gallery Section -->
            <div class="gallery-section">
                <h2>Public Crew Gallery</h2>
                <div class="gallery-grid" id="galleryGrid">
                    <div class="gallery-item">
                        <div class="gallery-avatar">👨‍🚀</div>
                        <div class="gallery-name">Crew Alpha</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-avatar">👩‍🚀</div>
                        <div class="gallery-name">Crew Beta</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-avatar">👨‍💻</div>
                        <div class="gallery-name">Crew Gamma</div>
                    </div>
                    <div class="gallery-item">
                        <div class="gallery-avatar">👩‍🔧</div>
                        <div class="gallery-name">Crew Delta</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Factory Footer -->
        <footer class="factory-footer">
            <p>Next Drop &copy; 2026 - Create, Share, Assemble</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
