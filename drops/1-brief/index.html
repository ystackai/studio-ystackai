<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next Drop - Crew Factory</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="factory-container">
        <!-- Factory Header -->
        <header class="factory-header">
            <h1 class="factory-title">Crew Factory</h1>
            <div class="factory-status">
                <span class="status-indicator"></span>
                <span class="status-text">Production Line Active</span>
            </div>
        </header>

        <!-- Main Content Area -->
        <main class="factory-main">
            <!-- Assembly Line -->
            <div class="assembly-line">
                <div class="line-item">
                    <div class="crew-assembly">
                        <div class="crew-part part-1"></div>
                        <div class="crew-part part-2"></div>
                        <div class="crew-part part-3"></div>
                    </div>
                    <button class="create-crew-btn">Create Crew</button>
                </div>
            </div>

            <!-- Crew Gallery Placeholder -->
            <div class="crew-gallery">
                <h2>Public Crew Gallery</h2>
                <div class="gallery-placeholder">
                    <p>Gallery placeholder - crews will appear here</p>
                </div>
            </div>
        </main>

        <!-- Factory Footer -->
        <footer class="factory-footer">
            <p>Next Drop - Crew Factory Experience</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
