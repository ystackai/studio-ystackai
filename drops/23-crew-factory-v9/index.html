<!DOCTYPE html>
<html lang="en">
<head>

    <title>404: The Elegant Sink</title>
    <style>
        /* Brutalist monochrome aesthetic with 1.618 ratio */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Golden ratio layout */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Frog element */
        .frog {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 16px;
            height: 16px;
            z-index: 10;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        /* Audio visualization */
        .audio-visualizer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 20px;
            background-color: #000000;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Accept entropy checkbox */
        .accept-entropy {
            position: absolute;
            bottom: 50%;
            transform: translateY(50%);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Hide scrollbar */
        body::-webkit-scrollbar {
            display: none;
        }

        /* Prevent text selection */
        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Animation keyframes for frog sinking */
        @keyframes sink {
            0% {
                transform: translateX(-50%) translateY(0);
            }
            100% {
                transform: translateX(-50%) translateY(calc(100vh - 16px));
            }
        }

        /* Animation for checkbox pulse */
        @keyframes pulse {
            0% {
                opacity: 0.5;
            }
            50% {
                opacity: 1;
            }
            100% {
                opacity: 0.5;
            }
        }

        /* Animation for fade to black */
        @keyframes fadeToBlack {
            0% {
                background-color: #FFFFFF;
            }

            }
            100% {
                background-color: #FFFFFF;
            }
        }
    </style>
</head>
