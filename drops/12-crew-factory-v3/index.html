<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Tiered Tragedy</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="grid">
            <div class="frog-container">
                <!-- Pixelated frog sprite -->
                <div class="frog">
                    <div class="frog-head">
                        <div class="frog-eye"></div>
                        <div class="frog-eye"></div>
                    </div>
                    <div class="frog-body"></div>
                    <div class="frog-leg frog-leg--left"></div>
                    <div class="frog-leg frog-leg--right"></div>
                </div>
            </div>
            
            <div class="content">
                <h1>404</h1>
                <p class="error-message">The page you're looking for has evaporated into the void.</p>
                <p class="tier-message">This is a generative panic drone, not a bug.</p>
            </div>
            
            <div class="button-container">
                <button class="accept-entropy-button">Accept Entropy</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
