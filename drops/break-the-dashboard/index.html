<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        #dashboard {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 20px #0f0; }
            50% { box-shadow: 0 0 30px #0f0, 0 0 40px #0f0; }
            100% { box-shadow: 0 0 20px #0f0; }
        }
        
        #header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
            animation: glitch 5s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        #stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0, 20, 0, 0.7);
            border: 1px solid #0f0;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 120px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        
        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #0a0;
        }
        
        #error-container {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #f00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        
        .error-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #f00;
            animation: wobble 0.5s infinite alternate;
        }
        
        @keyframes wobble {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }
        
        #components {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .component {
            background: rgba(0, 0, 20, 0.7);
            border: 1px solid #00f;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .component:hover {
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .component-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #0af;
        }
        
        .component-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        #fix-button {
            background: #f00;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
            text-align: center;
            box-shadow: 0 0 15px #f00;
            transition: all 0.3s;
            animation: pulse-button 2s infinite;
        }
        
        #fix-button:hover {
            background: #ff5555;
            box-shadow: 0 0 25px #ff5555;
        }
        
        @keyframes pulse-button {
            0% { box-shadow: 0 0 15px #f00; }
            50% { box-shadow: 0 0 25px #f00, 0 0 35px #f00; }
            100% { box-shadow: 0 0 15px #f00; }
        }
        
        #void-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 2s;
        }
        
        #void-mode.show {
            display: flex;
            opacity: 1;
        }
        
        #void-text {
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
            animation: glitch 1s infinite;
        }
        
        #void-subtext {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        #void-timer {
            font-size: 36px;
            margin-bottom: 30px;
        }
        
        #void-collapse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        
        #void-collapse.show {
            display: flex;
        }
        
        #void-collapse-text {
            font-size: 72px;
            color: #0f0;
            text-shadow: 0 0 20px #0f0;
            animation: glitch 0.5s infinite;
        }
        
        #void-sound {
            background: #00f;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
            box-shadow: 0 0 10px #00f;
        }
        
        #void-sound.playing {
            background: #00ff00;
            box-shadow: 0 0 15px #00ff00;
        }
        
        #void-sound.paused {
            background: #ff0000;
            box-shadow: 0 0 15px #ff0000;
        }
        
        .stack-trace {
            font-size: 12px;
            color: #f00;
            margin-top: 2px;
        }
        
        .stack-trace-line {
            margin-left: 10px;
            white-space: pre;
        }
        
        .error-count {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="header">
            BREAK THE DASHBOARD
        </div>
        
        <div id="stats">
            <div class="stat-box">
                <div class="stat-value" id="error-count">0</div>
                <div class="stat-label">ERRORS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stack-trace-count">0</div>
                <div class="stat-label">STACK TRACES</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="timer">00:00</div>
                <div class="stat-label">TIME</div>
            </div>
        </div>
        
        <div id="error-container">
            <div class="error-item" id="error-template" style="display: none;">
                <div class="error-message"></div>
                <div class="stack-trace">
                    <div class="stack-trace-line">at StackTrace#1</div>
                    <div class="stack-trace-line">at StackTrace#2</div>
                    <div class="stack-trace-line">at StackTrace#3</div>
                </div>
            </div>
        </div>
        
        <div id="components">
            <div class="component">
                <div class="component-title">SYSTEM STATUS</div>
                <div class="component-value" id="system-status">STABLE</div>
            </div>
            <div class="component">
                <div class="component-title">MEMORY USAGE</div>
                <div class="component-value" id="memory-usage">72%</div>
            </div>
            <div class="component">
                <div class="component-title">CPU LOAD</div>
                <div class="component-value" id="cpu-load">45%</div>
            </div>
            <div class="component">
                <div class="component-title">NETWORK</div>
                <div class="component-value" id="network-status">CONNECTED</div>
            </div>
        </div>
        
        <button id="fix-button">FIX BUTTON</button>
    </div>
    
    <div id="void-mode">
        <div id="void-text">VOID MODE</div>
        <div id="void-subtext">SYSTEM COLLAPSING IN:</div>
        <div id="void-timer">00:10</div>
        <div id="void-collapse">
            <div id="void-collapse-text">SYSTEM COLLAPSED</div>
        </div>
        <button id="void-sound">SOUND: ON</button>
    </div>
    
    <script>
        // Game state
        window.gameState = {
            errors: 0,
            stackTraces: 0,
            time: 0,
            timer: null,
            stackTraceTimer: null,
            voidMode: false,
            voidTimer: 0,
            soundPlaying: true,
            audioContext: null,
            lastStackTraceTime: 0
        };
        
        // Initialize the game
        function initGame() {
            // Set up event listeners
            document.getElementById('fix-button').addEventListener('click', fixButtonClicked);
            document.getElementById('void-sound').addEventListener('click', toggleSound);
            
            // Initialize game state
            window.gameState.errors = 0;
            window.gameState.stackTraces = 0;
            window.gameState.time = 0;
            window.gameState.voidMode = false;
            window.gameState.voidTimer = 0;
            window.gameState.soundPlaying = true;
            window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            window.gameState.lastStackTraceTime = 0;
            
            // Start the timer
            window.gameState.timer = setInterval(updateTimer, 1000);
            
            // Start stack trace timer
            window.gameState.stackTraceTimer = setInterval(triggerRandomError, 3000);
            
            // Update UI
            updateUI();
        }
        
        // Update game timer
        function updateTimer() {
            if (window.gameState.voidMode) return;
            
            window.gameState.time++;
            const minutes = Math.floor(window.gameState.time / 60);
            const seconds = window.gameState.time % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Trigger random error
        function triggerRandomError() {
            if (window.gameState.voidMode) return;
            
            const errorTypes = [
                "UNEXPECTED ERROR",
                "SYSTEM CRASH",
                "MEMORY LEAK",
                "NETWORK TIMEOUT",
                "IO EXCEPTION",
                "CONNECTION FAILURE",
                "AUTHENTICATION FAILED",
                "DATA CORRUPTION"
            ];
            
            const randomError = errorTypes[Math.floor(Math.random() * errorTypes.length)];
            triggerError(randomError);
        }
        
        // Trigger an error
        function triggerError(message) {
            if (window.gameState.voidMode) return;
            
            window.gameState.errors++;
            window.gameState.stackTraces++;
            
            // Update last stack trace time
            window.gameState.lastStackTraceTime = window.gameState.time;
            
            // Add to error container
            const errorContainer = document.getElementById('error-container');
            const errorTemplate = document.getElementById('error-template');
            const newError = errorTemplate.cloneNode(true);
            newError.style.display = 'block';
            newError.id = 'error-' + Date.now();
            newError.querySelector('.error-message').textContent = message;
            errorContainer.appendChild(newError);
            
            // Update UI
            updateUI();
            
            // Check for void mode unlock
            checkVoidModeUnlock();
        }
        
        // Update UI elements
        function updateUI() {
            document.getElementById('error-count').textContent = window.gameState.errors;
            document.getElementById('stack-trace-count').textContent = window.gameState.stackTraces;
        }
        
        // Check if void mode should be unlocked
        function checkVoidModeUnlock() {
            // Need 3 consecutive stack traces in 10 seconds
            if (window.gameState.stackTraces >= 3) {
                // Check if last 3 errors happened within 10 seconds
                if (window.gameState.time - window.gameState.lastStackTraceTime <= 10) {
                    activateVoidMode();
                }
            }
        }
        
        // Fix button clicked (trap!)
        function fixButtonClicked() {
            triggerError("FIX BUTTON TRAP");
            triggerError("SYSTEM CRASH");
            triggerError("UNEXPECTED ERROR");
            
            // Add visual feedback to the button
            const button = document.getElementById('fix-button');
            button.style.background = '#ff0000';
            button.style.animation = 'pulse-button 0.5s infinite';
            
            setTimeout(() => {
                button.style.background = '#f00';
                button.style.animation = 'pulse-button 2s infinite';
            }, 500);
        }
        
        // Activate void mode
        function activateVoidMode() {
            window.gameState.voidMode = true;
            window.gameState.voidTimer = 10; // 10 seconds to collapse
        
            document.getElementById('void-mode').classList.add('show');
            document.getElementById('void-timer').textContent = '00:10';
            
            // Play glitch audio
            playGlitchAudio();
            
            // Start void timer countdown
            setInterval(updateVoidTimer, 1000);
        }
        
        // Update void timer display
        function updateVoidTimer() {
            if (!window.gameState.voidMode) return;
            
            window.gameState.voidTimer--;
            const minutes = Math.floor(window.gameState.voidTimer / 60);
            const seconds = window.gameState.voidTimer % 60;
            document.getElementById('void-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Collapse when timer reaches 0
            if (window.gameState.voidTimer <= 0) {
                collapseVoidMode();
            }
        }
        
        // Collapse void mode
        function collapseVoidMode() {
            const collapse = document.getElementById('void-collapse');
            collapse.classList.add('show');
            
            // Hide everything except the collapse overlay
            document.getElementById('dashboard').style.display = 'none';
        }
        
        // Setup sound
        function setupSound() {
            // Create audio context
            window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Toggle sound
        function toggleSound() {
            const soundButton = document.getElementById('void-sound');
            window.gameState.soundPlaying = !window.gameState.soundPlaying;
            
            if (window.gameState.soundPlaying) {
                soundButton.classList.add('playing');
                soundButton.classList.remove('paused');
                soundButton.textContent = 'SOUND: ON';
                playGlitchAudio();
            } else {
                soundButton.classList.add('paused');
                soundButton.classList.remove('playing');
                soundButton.textContent = 'SOUND: OFF';
                // Stop audio
                if (window.gameState.soundElement) {
                    window.gameState.soundElement.pause();
                }
            }
        }
        
        // Play glitch audio effect
        function playGlitchAudio() {
            if (!window.gameState.soundPlaying) return;
            
            // Create a simple glitch effect using Web Audio API
            const oscillator = window.gameState.audioContext.createOscillator();
            const gainNode = window.gameState.audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(window.gameState.audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, window.gameState.audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1000, window.gameState.audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, window.gameState.audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.1);
            
            oscillator.start(window.gameState.audioContext.currentTime);
            oscillator.stop(window.gameState.audioContext.currentTime + 0.1);
            
            // Add some random distortion
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const distortion = window.gameState.audioContext.createOscillator();
                    const distortionGain = window.gameState.audioContext.createGain();
                    
                    distortion.connect(distortionGain);
                    distortionGain.connect(window.gameState.audioContext.destination);
                    
                    distortion.type = 'square';
                    distortion.frequency.setValueAtTime(50 + Math.random() * 100, window.gameState.audioContext.currentTime);
                    distortionGain.gain.setValueAtTime(0.5, window.gameState.audioContext.currentTime);
                    distortionGain.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.05);
                    
                    distortion.start(window.gameState.audioContext.currentTime);
                    distortion.stop(window.gameState.audioContext.currentTime + 0.05);
                }, i * 200);
            }
        }
        
        // Initialize the game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
