<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        #dashboard {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 20px #0f0; }
            50% { box-shadow: 0 0 30px #0f0, 0 0 40px #0f0; }
            100% { box-shadow: 0 0 20px #0f0; }
        }
        
        #header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
            animation: glitch 5s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        #stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0, 20, 0, 0.7);
            border: 1px solid #0f0;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 120px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        
        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #0a0;
        }
        
        #error-container {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #f00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        
        .error-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #f00;
            animation: wobble 0.5s infinite alternate;
        }
        
        @keyframes wobble {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }
        
        #components {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .component {
            background: rgba(0, 0, 20, 0.7);
            border: 1px solid #00f;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .component:hover {
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .component-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #0af;
        }
        
        .component-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        #fix-button {
            background: #f00;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
            text-align: center;
            box-shadow: 0 0 15px #f00;
            transition: all 0.3s;
            animation: pulse-button 2s infinite;
        }
        
        #fix-button:hover {
            background: #ff5555;
            box-shadow: 0 0 25px #ff5555;
        }
        
        @keyframes pulse-button {
            0% { box-shadow: 0 0 15px #f00; }
            50% { box-shadow: 0 0 25px #f00, 0 0 35px #f00; }
            100% { box-shadow: 0 0 15px #f00; }
        }
        
        #void-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 2s;
        }
        
        #void-mode.show {
            display: flex;
            opacity: 1;
        }
        
        #void-text {
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
            animation: glitch 1s infinite;
        }
        
        #void-subtext {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            animation: pulse 2s infinite;
        }
        
        #void-timer {
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #0f0;
        }
        
        #void-sound {
            background: #00f;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 0 10px #00f;
            transition: all 0.3s;
        }
        
        #void-sound.playing {
            background: #00a;
            box-shadow: 0 0 20px #00a;
        }
        
        #void-sound.paused {
            background: #555;
            box-shadow: 0 0 10px #555;
        }
        
        .glitch-text {
            animation: glitch 2s infinite;
        }
        
        .wobble-text {
            animation: wobble 0.3s infinite alternate;
        }
        
        .floating {
            animation: float 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <h1 id="header">BREAK THE DASHBOARD</h1>
        
        <div id="stats">
            <div class="stat-box">
                <div class="stat-value" id="error-count">0</div>
                <div class="stat-label">ERRORS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stack-trace-count">0</div>
                <div class="stat-label">STACK TRACES</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="timer">00:00</div>
                <div class="stat-label">TIME</div>
            </div>
        </div>
        
        <div id="error-container"></div>
        
        <div id="components">
            <div class="component">
                <div class="component-title">SYSTEM STATUS</div>
                <div class="component-value" id="system-status">OK</div>
            </div>
            <div class="component">
                <div class="component-title">MEMORY USAGE</div>
                <div class="component-value" id="memory-usage">0%</div>
            </div>
            <div class="component">
                <div class="component-title">CPU LOAD</div>
                <div class="component-value" id="cpu-load">0%</div>
            </div>
            <div class="component">
                <div class="component-title">NETWORK</div>
                <div class="component-value" id="network">STABLE</div>
            </div>
        </div>
        
        <button id="fix-button">FIX BUTTON</button>
        
        <div id="void-mode">
            <div id="void-text" class="glitch-text">VOID MODE</div>
            <div id="void-subtext">SYSTEM IS GOING DARK</div>
            <div id="void-timer">00:10</div>
            <button id="void-sound">SOUND: OFF</button>
        </div>
    </div>

    <script>
        // Game state
        window.gameState = {
            errorCount: 0,
            stackTraceCount: 0,
            timer: 0,
            voidMode: false,
            soundPlaying: true,
            stackTraceHistory: [],
            audioContext: null,
            soundElement: null
        };
        
        // Initialize the game
        function initGame() {
            // Set up event listeners
            document.getElementById('fix-button').addEventListener('click', fixButtonClicked);
            document.getElementById('void-sound').addEventListener('click', toggleSound);
            
            // Initialize components with random values
            updateComponents();
            
            // Start game loop
            setInterval(updateGame, 1000);
            setInterval(updateComponents, 2000);
            setInterval(triggerRandomError, 3000);
            
            // Setup audio
            setupSound();
        }
        
        // Update game state
        function updateGame() {
            if (window.gameState.voidMode) {
                // Update void timer
                window.gameState.voidTimer--;
                updateVoidTimer();
                
                if (window.gameState.voidTimer <= 0) {
                    // Game over - void mode collapsed
                    document.getElementById('void-text').textContent = "SYSTEM COLLAPSED";
                    document.getElementById('void-subtext').textContent = "YOU WIN!";
                    document.getElementById('void-timer').textContent = "00:00";
                }
            } else {
                // Update regular timer
                window.gameState.timer++;
                updateTimer();
                
                // Randomly trigger errors to build up stack traces
                if (Math.random() > 0.8) {
                    triggerError("RANDOM ERROR");
                }
            }
        }
        
        // Update timer display
        function updateTimer() {
            const minutes = Math.floor(window.gameState.timer / 60);
            const seconds = window.gameState.timer % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Trigger a random error
        function triggerRandomError() {
            if (window.gameState.voidMode) return;
            
            const errorTypes = [
                "UNHANDLED EXCEPTION",
                "MEMORY LEAK DETECTED",
                "SYSTEM OVERLOAD",
                "CRITICAL FAILURE",
                "CONNECTION TIMEOUT",
                "DATA CORRUPTION",
                "NETWORK DISRUPTION"
            ];
            
            const errorType = errorTypes[Math.floor(Math.random() * errorTypes.length)];
            triggerError(errorType);
        }
        
        // Trigger an error
        function triggerError(message) {
            if (window.gameState.voidMode) return;
            
            window.gameState.errorCount++;
            document.getElementById('error-count').textContent = window.gameState.errorCount;
            
            // Add to error container
            const errorContainer = document.getElementById('error-container');
            const errorItem = document.createElement('div');
            errorItem.className = 'error-item';
            errorItem.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            errorContainer.appendChild(errorItem);
            errorContainer.scrollTop = errorContainer.scrollHeight;
            
            // Add stack trace
            window.gameState.stackTraceCount++;
            document.getElementById('stack-trace-count').textContent = window.gameState.stackTraceCount;
            window.gameState.stackTraceHistory.push(Date.now());
            
            // Check if we have 3 consecutive stack traces within 10 seconds
            if (window.gameState.stackTraceHistory.length >= 3) {
                const latest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 1];
                const secondLatest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 2];
                const thirdLatest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 3];
                
                // If all 3 traces happened within 10 seconds, activate void mode
                if (latest - thirdLatest <= 10000) {
                    activateVoidMode();
                }
            }
        }
        
        // Update components with random values
        function updateComponents() {
            if (window.gameState.voidMode) return;
            
            const components = document.querySelectorAll('.component-value');
            components.forEach(component => {
                if (component.id === 'system-status') {
                    const statuses = ['OK', 'WARNING', 'CRITICAL'];
                    component.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                } else if (component.id === 'network') {
                    const statuses = ['STABLE', 'SLOW', 'UNRELIABLE'];
                    component.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                } else {
                    component.textContent = Math.floor(Math.random() * 100) + '%';
                }
            });
        }
        
        // Fix button clicked (trap!)
        function fixButtonClicked() {
            triggerError("FIX BUTTON TRAP");
            triggerError("SYSTEM CRASH");
            triggerError("UNEXPECTED ERROR");
            
            // Add visual feedback to the button
            const button = document.getElementById('fix-button');
            button.style.background = '#ff0000';
            button.style.animation = 'pulse-button 0.5s infinite';
            
            setTimeout(() => {
                button.style.background = '#f00';
                button.style.animation = 'pulse-button 2s infinite';
            }, 500);
        }
        
        // Activate void mode
        function activateVoidMode() {
            window.gameState.voidMode = true;
            window.gameState.voidTimer = 10; // 10 seconds to collapse
            
            document.getElementById('void-mode').classList.add('show');
            document.getElementById('void-timer').textContent = '00:10';
            
            // Play glitch audio
            playGlitchAudio();
        }
        
        // Update void timer display
        function updateVoidTimer() {
            const minutes = Math.floor(window.gameState.voidTimer / 60);
            const seconds = window.gameState.voidTimer % 60;
            document.getElementById('void-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Setup sound
        function setupSound() {
            // Create audio context
            window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Toggle sound
        function toggleSound() {
            const soundButton = document.getElementById('void-sound');
            window.gameState.soundPlaying = !window.gameState.soundPlaying;
            
            if (window.gameState.soundPlaying) {
                soundButton.classList.add('playing');
                soundButton.classList.remove('paused');
                soundButton.textContent = 'SOUND: ON';
                playGlitchAudio();
            } else {
                soundButton.classList.add('paused');
                soundButton.classList.remove('playing');
                soundButton.textContent = 'SOUND: OFF';
                // Stop audio
                if (window.gameState.soundElement) {
                    window.gameState.soundElement.pause();
                }
            }
        }
        
        // Play glitch audio effect
        function playGlitchAudio() {
            if (!window.gameState.soundPlaying) return;
            
            // Create a simple glitch effect using Web Audio API
            const oscillator = window.gameState.audioContext.createOscillator();
            const gainNode = window.gameState.audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(window.gameState.audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, window.gameState.audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1000, window.gameState.audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, window.gameState.audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.1);
            
            oscillator.start(window.gameState.audioContext.currentTime);
            oscillator.stop(window.gameState.audioContext.currentTime + 0.1);
            
            // Add some random distortion
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const distortion = window.gameState.audioContext.createOscillator();
                    const distortionGain = window.gameState.audioContext.createGain();
                    
                    distortion.connect(distortionGain);
                    distortionGain.connect(window.gameState.audioContext.destination);
                    
                    distortion.type = 'square';
                    distortion.frequency.setValueAtTime(50 + Math.random() * 100, window.gameState.audioContext.currentTime);
                    distortionGain.gain.setValueAtTime(0.5, window.gameState.audioContext.currentTime);
                    distortionGain.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.05);
                    
                    distortion.start(window.gameState.audioContext.currentTime);
                    distortion.stop(window.gameState.audioContext.currentTime + 0.05);
                }, i * 200);
            }
        }
        
        // Initialize the game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
