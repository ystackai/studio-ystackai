<!DOCTYPE html>
<html lang="en" id="game-container">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .component {
            background-color: #111;
            border: 1px solid #0f0;
            padding: 15px;
            border-radius: 5px;
            position: relative;
            transition: all 0.1s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .component:hover {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .component.wobble {
            animation: wobble 0.1s infinite alternate;
        }

        @keyframes wobble {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(5px) rotate(2deg); }
        }

        .error-counter {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .stack-trace {
            font-size: 10px;
            white-space: pre-wrap;
            margin-top: 10px;
            color: #f00;
            max-height: 100px;
            overflow-y: auto;
        }

        #fix-button {
            background-color: #ff0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #fix-button:hover {
            background-color: #ff5555;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        #timer {
            font-size: 20px;
            text-align: center;
            margin: 20px 0;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        #void-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            text-align: center;
            padding-top: 20%;
            animation: fadeOut 5s forwards;
        }

        #void-mode h1 {
            color: #fff;
            font-size: 48px;
            animation: pulse 1s infinite;
            text-shadow: 0 0 10px #fff;
        }

        #void-mode p {
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 5px #fff;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .glitch {
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .error-source {
            margin: 10px 0;
            padding: 10px;
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 3px;
            cursor: pointer;
        }

        .error-source:hover {
            background-color: rgba(255, 0, 0, 0.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-bar span {
            color: #0f0;
        }
    </style>
</head>
<body>
    <h1>Break the Dashboard</h1>
    <div id="timer">Time until collapse: <span id="time-left">10</span> seconds</div>
    
    <div id="dashboard">
        <div class="component" id="component-1">
            <div class="error-counter">Errors: <span id="error-count-1">0</span></div>
            <div class="stack-trace" id="stack-trace-1"></div>
        </div>
        <div class="component" id="component-2">
            <div class="error-counter">Errors: <span id="error-count-2">0</span></div>
            <div class="stack-trace" id="stack-trace-2"></div>
        </div>
        <div class="component" id="component-3">
            <div class="error-counter">Errors: <span id="error-count-3">0</span></div>
            <div class="stack-trace" id="stack-trace-3"></div>
        </div>
        <div class="component" id="component-4">
            <div class="error-counter">Errors: <span id="error-count-4">0</span></div>
            <div class="stack-trace" id="stack-trace-4"></div>
        </div>
        <div class="component" id="component-5">
            <div class="error-counter">Errors: <span id="error-count-5">0</span></div>
            <div class="stack-trace" id="stack-trace-5"></div>
        </div>
    </div>

    <button id="fix-button">FIX BUTTON (TRAP)</button>

    <div class="status-bar">
        <span>Stack Traces: <span id="stack-trace-count">0</span></span>
        <span>System Health: <span id="health">100%</span></span>
    </div>

    <div id="error-sources">
        <h3>Error Sources:</h3>
        <div class="error-source" id="source-1">Memory Leak</div>
        <div class="error-source" id="source-2">Network Timeout</div>
        <div class="error-source" id="source-3">Invalid Configuration</div>
        <div class="error-source" id="source-4">API Crash</div>
        <div class="error-source" id="source-5">UI Render Failure</div>
    </div>

    <div id="void-mode">
        <h1>CURATED VOID</h1>
        <p>System collapse achieved</p>
    </div>

    <script>
        // Game state
        const gameState = {
            errors: 0,
            stackTraces: [],
            voidMode: false,
            timeLeft: 10,
            cascadeThreshold: 3,
            cascadeCount: 0,
            timer: null,
            stackTraceCount: 0,
            health: 100,
            maxStackTraces: 10
        };

        // Initialize the game
        function initGame() {
            // Set up components to be clickable
            for (let i = 1; i <= 5; i++) {
                const component = document.getElementById(`component-${i}`);
                component.addEventListener('click', () => addError(i));
            }

            // Set up error sources
            for (let i = 1; i <= 5; i++) {
                const source = document.getElementById(`source-${i}`);
                source.addEventListener('click', () => addErrorFromSource(i));
            }

            // Set up fix button (trap)
            const fixButton = document.getElementById('fix-button');
            fixButton.addEventListener('click', () => {
                // This is the trap - clicking fix makes things worse
                addError(1);
                addError(2);
                addError(3);
                addError(4);
                addError(5);
                // Also add random errors to make it worse
                addRandomError();
                addRandomError();
                
                // Add more errors from error sources
                addErrorFromSource(1);
                addErrorFromSource(2);
            });

            // Start the timer
            startTimer();
            
            // Update health bar
            updateHealthBar();
        }

        // Add an error to a component
        function addError(componentId) {
            const errorCount = document.getElementById(`error-count-${componentId}`);
            const stackTrace = document.getElementById(`stack-trace-${componentId}`);
            
            // Increase error count
            const currentCount = parseInt(errorCount.textContent);
            errorCount.textContent = currentCount + 1;
            
            // Add stack trace
            const trace = generateStackTrace();
            stackTrace.textContent += trace + '\n';
            
            // Add to global stack traces
            gameState.stackTraces.push(trace);
            gameState.stackTraceCount++;
            document.getElementById('stack-trace-count').textContent = gameState.stackTraceCount;
            
            // Make component wobble
            const component = document.getElementById(`component-${componentId}`);
            component.classList.add('wobble');
            setTimeout(() => component.classList.remove('wobble'), 1000);

            // Update global error count
            gameState.errors++;
            
            // Check if we have cascading failures
            checkCascadingFailure();
            
            // Check if we should enter void mode
            if (gameState.stackTraces.length >= gameState.maxStackTraces) {
                enterVoidMode();
            }
            
            // Update health
            updateHealth();
        }

        // Add error from an error source
        function addErrorFromSource(sourceId) {
            // Add to a random component
            const randomComponent = Math.floor(Math.random() * 5) + 1;
            addError(randomComponent);
            
            // Add to a second random component to create cascading
            const secondComponent = Math.floor(Math.random() * 5) + 1;
            if (secondComponent !== randomComponent) {
                addError(secondComponent);
            }
            
            // Add to a third random component
            const thirdComponent = Math.floor(Math.random() * 5) + 1;
            if (thirdComponent !== randomComponent && thirdComponent !== secondComponent) {
                addError(thirdComponent);
            }
        }

        // Update health bar
        function updateHealth() {
            // Decrease health based on number of stack traces
            gameState.health = Math.max(0, 100 - (gameState.stackTraces.length * 2));
            document.getElementById('health').textContent = gameState.health + '%';
            
            // Change color based on health
            const healthElement = document.getElementById('health');
            if (gameState.health > 70) {
                healthElement.style.color = '#0f0';
            } else if (gameState.health > 30) {
                healthElement.style.color = '#ff0';
            } else {
                healthElement.style.color = '#f00';
            }
        }

        // Update health bar display
        function updateHealthBar() {
            const healthElement = document.getElementById('health');
            healthElement.textContent = gameState.health + '%';
        }

        // Add a random error (for the trap button)
        function addRandomError() {
            const randomComponent = Math.floor(Math.random() * 5) + 1;
            addError(randomComponent);
        }

        // Generate a stack trace
        function generateStackTrace() {
            const functions = ['validateInput()', 'processData()', 'renderComponent()', 'handleEvent()', 'calculateResult()', 'updateUI()', 'connectToAPI()', 'parseJSON()', 'formatOutput()', 'checkSecurity()', 'handleRequest()', 'validateForm()', 'processTransaction()', 'updateState()', 'checkPermissions()', 'loadModule()', 'initializeComponent()', 'setupEnvironment()', 'executeTask()', 'handleResponse()', 'connectToDatabase()', 'authenticateUser()', 'processPayment()', 'sendEmail()', 'validateToken()', 'generateReport()', 'updateInventory()', 'syncData()', 'handleRequest()', 'validateSchema()', 'transformData()', 'serializeObject()', 'deserializeObject()', 'encryptData()', 'decryptData()', 'compressData()', 'decompressData()', 'cacheResult()', 'invalidateCache()', 'handleException()', 'logError()', 'sendNotification()', 'triggerEvent()', 'dispatchAction()', 'updateModel()', 'renderTemplate()', 'compileTemplate()', 'executeQuery()', 'processBatch()', 'handleCallback()', 'setupListener()', 'registerModule()', 'initializeService()', 'connectSocket()', 'handleTimeout()', 'retryOperation()', 'abortOperation()', 'completeTask()', 'scheduleJob()', 'executeScript()', 'parseXML()', 'formatJSON()', 'validateURL()', 'normalizePath()', 'resolveHost()', 'handleRedirect()', 'processRequest()', 'validateResponse()', 'handleAuthentication()', 'manageSession()', 'handleAuthorization()', 'processTransaction()', 'validateInput()', 'processData()', 'renderComponent()', 'handleEvent()', 'calculateResult()', 'updateUI()', 'connectToAPI()', 'parseJSON()', 'formatOutput()', 'checkSecurity()', 'handleRequest()', 'validateForm()', 'processTransaction()', 'updateState()', 'checkPermissions()', 'loadModule()', 'initializeComponent()', 'setupEnvironment()', 'executeTask()', 'handleResponse()', 'connectToDatabase()', 'authenticateUser()', 'processPayment()', 'sendEmail()', 'validateToken()', 'generateReport()', 'updateInventory()', 'syncData()', 'handleRequest()', 'validateSchema()', 'transformData()', 'serializeObject()', 'deserializeObject()', 'encryptData()', 'decryptData()', 'compressData()', 'decompressData()', 'cacheResult()', 'invalidateCache()', 'handleException()', 'logError()', 'sendNotification()', 'triggerEvent()', 'dispatchAction()', 'updateModel()', 'renderTemplate()', 'compileTemplate()', 'executeQuery()', 'processBatch()', 'handleCallback()', 'setupListener()', 'registerModule()', 'initializeService()', 'connectSocket()', 'handleTimeout()', 'retryOperation()', 'abortOperation()', 'completeTask()', 'scheduleJob()', 'executeScript()', 'parseXML()', 'formatJSON()', 'validateURL()', 'normalizePath()', 'resolveHost()', 'handleRedirect()', 'processRequest()', 'validateResponse()', 'handleAuthentication()', 'manageSession()', 'handleAuthorization()', 'processTransaction()'];
            const errors = ['TypeError: Cannot read property "x" of undefined', 'ReferenceError: variable is not defined', 'SyntaxError: Unexpected token', 'RangeError: Maximum call stack size exceeded', 'Error: Invalid state transition', 'Error: Connection timeout', 'Error: Resource not found', 'Error: Permission denied', 'Error: Out of memory', 'Error: Invalid configuration', 'Error: Service unavailable', 'Error: Internal server error', 'Error: Network error', 'Error: Invalid input', 'Error: Timeout exceeded', 'Error: Memory leak detected', 'Error: Stack overflow', 'Error: Unhandled exception', 'Error: Critical failure', 'Error: System crash', 'Error: Module not found', 'Error: Invalid parameter', 'Error: Out of bounds', 'Error: Division by zero', 'Error: File not accessible', 'Error: Database connection failed', 'Error: Invalid response', 'Error: Timeout during operation', 'Error: Invalid format', 'Error: Configuration error', 'Error: Security violation', 'Error: Access denied', 'Error: Resource exhausted', 'Error: Invalid operation', 'Error: Invalid state', 'Error: Service not available', 'Error: Communication failure', 'Error: Data corruption', 'Error: License expired', 'Error: Invalid certificate', 'Error: Authentication failed', 'Error: Authorization required', 'Error: Session timeout', 'Error: Invalid token', 'Error: Cache miss', 'Error: Resource deadlock', 'Error: Invalid memory access', 'Error: Stack corruption', 'Error: Invalid instruction', 'Error: Memory allocation failed', 'Error: Invalid pointer', 'Error: Buffer overflow', 'Error: Invalid array access', 'Error: Invalid class instantiation', 'Error: Invalid method call', 'Error: Invalid property access', 'Error: Invalid interface implementation', 'Error: Invalid inheritance', 'Error: Invalid polymorphism', 'Error: Invalid encapsulation', 'Error: Invalid abstraction', 'Error: Invalid module loading', 'Error: Invalid dependency', 'Error: Circular dependency', 'Error: Missing dependency', 'Error: Invalid configuration file', 'Error: Invalid environment variable', 'Error: Invalid system path', 'Error: Invalid user input', 'Error: Invalid data type', 'Error: Invalid data structure', 'Error: Invalid algorithm', 'Error: Invalid logic flow', 'Error: Invalid conditional statement', 'Error: Invalid loop structure', 'Error: Invalid function signature', 'Error: Invalid parameter count', 'Error: Invalid return type', 'Error: Invalid exception handling', 'Error: Invalid error propagation', 'Error: Invalid error recovery', 'Error: Invalid error reporting', 'Error: Invalid error logging', 'Error: Invalid error monitoring', 'Error: Invalid error alerting', 'Error: Invalid error notification', 'Error: Invalid error resolution', 'Error: Invalid error tracking', 'Error: Invalid error categorization', 'Error: Invalid error classification', 'Error: Invalid error priority', 'Error: Invalid error severity', 'Error: Invalid error impact', 'Error: Invalid error mitigation', 'Error: Invalid error prevention', 'Error: Invalid error detection', 'Error: Invalid error resolution', 'Error: Invalid error recovery', 'Error: Invalid error reporting', 'Error: Invalid error logging', 'Error: Invalid error monitoring', 'Error: Invalid error alerting', 'Error: Invalid error notification', 'Error: Invalid error resolution', 'Error: Invalid error tracking', 'Error: Invalid error categorization', 'Error: Invalid error classification', 'Error: Invalid error priority', 'Error: Invalid error severity', 'Error: Invalid error impact', 'Error: Invalid error mitigation', 'Error: Invalid error prevention', 'Error: Invalid error detection'];
            
            const trace = [];
            trace.push('Stack trace:');
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + errors[Math.floor(Math.random() * errors.length)]);
            
            return trace.join('\n');
        }

        // Check for cascading failures
        function checkCascadingFailure() {
            // Check if we've had 3 consecutive stack traces in the last 10 seconds
            if (gameState.stackTraces.length >= gameState.cascadeThreshold) {
                gameState.cascadeCount++;
                if (gameState.cascadeCount >= gameState.cascadeThreshold) {
                    enterVoidMode();
                }
            }
        }

        // Start the timer
        function startTimer() {
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                document.getElementById('time-left').textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timer);
                    enterVoidMode();
                }
            }, 1000);
        }

        // Enter void mode
        function enterVoidMode() {
            gameState.voidMode = true;
            document.getElementById('void-mode').style.display = 'block';
            document.body.classList.add('glitch');
            
            // Stop the timer
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            
            // Add final stack traces to make it look like a complete system collapse
            for (let i = 1; i <= 5; i++) {
                const stackTrace = document.getElementById(`stack-trace-${i}`);
                stackTrace.textContent += 'System collapse: ' + generateStackTrace() + '\n';
            }
            
            // Add audio effect for void mode
            playVoidSound();
        }

        // Play void sound effect
        function playVoidSound() {
            // Create audio context for glitch effect
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create a simple glitch sound
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 2);
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 2);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 2);
                
            } catch (e) {
                console.log("Audio not supported in this browser");
            }
        }

        // Initialize when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
