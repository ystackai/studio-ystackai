<!DOCTYPE html>
<html lang="en" id="game-container">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .component {
            background-color: #111;
            border: 1px solid #0f0;
            padding: 15px;
            border-radius: 5px;
            position: relative;
            transition: all 0.1s ease;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }

        .component:hover {
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.6);
        }

        .component.wobble {
            animation: wobble 0.1s infinite alternate;
        }

        @keyframes wobble {
            0% { transform: translateX(0) rotate(0deg); }
            100% { transform: translateX(5px) rotate(2deg); }
        }

        .error-counter {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
        }

        .stack-trace {
            font-size: 10px;
            white-space: pre-wrap;
            margin-top: 10px;
            color: #f00;
            max-height: 100px;
            overflow-y: auto;
        }

        #fix-button {
            background-color: #ff0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            cursor: pointer;
            margin: 20px 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #fix-button:hover {
            background-color: #ff5555;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        #timer {
            font-size: 20px;
            text-align: center;
            margin: 20px 0;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }

        #void-mode {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 1000;
            text-align: center;
            padding-top: 20%;
            animation: fadeOut 5s forwards;
        }

        #void-mode h1 {
            color: #fff;
            font-size: 48px;
            animation: pulse 1s infinite;
            text-shadow: 0 0 10px #fff;
        }

        #void-mode p {
            color: #fff;
            font-size: 24px;
            text-shadow: 0 0 5px #fff;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .glitch {
            animation: glitch 0.3s infinite;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .error-source {
            margin: 10px 0;
            padding: 10px;
            background-color: rgba(255, 0, 0, 0.1);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 3px;
            cursor: pointer;
        }

        .error-source:hover {
            background-color: rgba(255, 0, 0, 0.2);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-bar span {
            color: #0f0;
        }
    </style>
</head>
<body>
    <h1>Break the Dashboard</h1>
    <div id="timer">Time until collapse: <span id="time-left">10</span> seconds</div>
    
    <div id="dashboard">
        <div class="component" id="component-1">
            <div class="error-counter">Errors: <span id="error-count-1">0</span></div>
            <div class="stack-trace" id="stack-trace-1"></div>
        </div>
        <div class="component" id="component-2">
            <div class="error-counter">Errors: <span id="error-count-2">0</span></div>
            <div class="stack-trace" id="stack-trace-2"></div>
        </div>
        <div class="component" id="component-3">
            <div class="error-counter">Errors: <span id="error-count-3">0</span></div>
            <div class="stack-trace" id="stack-trace-3"></div>
        </div>
        <div class="component" id="component-4">
            <div class="error-counter">Errors: <span id="error-count-4">0</span></div>
            <div class="stack-trace" id="stack-trace-4"></div>
        </div>
        <div class="component" id="component-5">
            <div class="error-counter">Errors: <span id="error-count-5">0</span></div>
            <div class="stack-trace" id="stack-trace-5"></div>
        </div>
        <div class="component" id="component-6">
            <div class="error-counter">Errors: <span id="error-count-6">0</span></div>
            <div class="stack-trace" id="stack-trace-6"></div>
        </div>
    </div>

    <button id="fix-button">FIX BUTTON (TRAP)</button>

    <div class="status-bar">
        <span>Stack Traces: <span id="stack-trace-count">0</span></span>
        <span>System Health: <span id="system-health">100</span>%</span>
    </div>

    <div id="void-mode">
        <h1>VOID MODE</h1>
        <p>System collapse complete</p>
        <p>Curated silence achieved</p>
    </div>

    <script>
        // Game state
        const gameState = {
            timeLeft: 10,
            timer: null,
            stackTraces: [],
            cascadeCount: 0,
            cascadeThreshold: 3,
            voidMode: false,
            systemHealth: 100,
            errorSources: []
        };

        // Initialize the game
        function initGame() {
            // Set up error sources
            gameState.errorSources = [
                { id: 'component-1', name: 'Authentication Module' },
                { id: 'component-2', name: 'Database Connector' },
                { id: 'component-3', name: 'User Interface Engine' },
                { id: 'component-4', name: 'Network Layer' },
                { id: 'component-5', name: 'Security Firewall' },
                { id: 'component-6', name: 'Memory Manager' }
            ];

            // Start the timer
            startTimer();

            // Add event listeners
            document.getElementById('fix-button').addEventListener('click', triggerFixTrap);

            // Add click handlers to all components
            for (let i = 1; i <= 6; i++) {
                document.getElementById(`component-${i}`).addEventListener('click', () => triggerError(i));
            }

            // Add random error sources
            setInterval(() => {
                if (!gameState.voidMode) {
                    const randomSource = gameState.errorSources[Math.floor(Math.random() * gameState.errorSources.length)];
                    triggerErrorFromSource(randomSource);
                }
            }, 2000);
        }

        // Trigger an error on a component
        function triggerError(componentId) {
            if (gameState.voidMode) return;

            const component = document.getElementById(`component-${componentId}`);
            const errorCount = document.getElementById(`error-count-${componentId}`);
            const stackTrace = document.getElementById(`stack-trace-${componentId}`);

            // Increase error count
            const currentCount = parseInt(errorCount.textContent);
            errorCount.textContent = currentCount + 1;

            // Add a stack trace
            const trace = generateStackTrace();
            stackTrace.textContent += trace + '\n';

            // Add to global stack trace count
            gameState.stackTraces.push(trace);
            document.getElementById('stack-trace-count').textContent = gameState.stackTraces.length;

            // Apply wobble effect
            component.classList.add('wobble');
            setTimeout(() => {
                component.classList.remove('wobble');
            }, 500);

            // Decrease system health
            gameState.systemHealth = Math.max(0, gameState.systemHealth - 5);
            document.getElementById('system-health').textContent = gameState.systemHealth;

            // Check for cascading failure
            checkCascadingFailure();
        }

        // Trigger error from a specific source
        function triggerErrorFromSource(source) {
            const componentId = source.id.split('-')[1];
            triggerError(componentId);
        }

        // Generate a stack trace
        function generateStackTrace() {
            const functions = ['authenticateUser()', 'connectDatabase()', 'renderUI()', 'handleNetworkRequest()', 'validateInput()', 'processPayment()', 'encryptData()', 'decryptData()', 'parseJSON()', 'serializeData()', 'loadModule()', 'unloadModule()', 'updateCache()', 'clearCache()', 'sendEmail()', 'receiveMessage()', 'parseXML()', 'formatDate()', 'calculateTotal()', 'validateToken()', 'checkPermission()', 'handleException()', 'logEvent()', 'emitSignal()', 'subscribeToChannel()', 'unsubscribeFromChannel()', 'createInstance()', 'destroyInstance()', 'getEnvironment()', 'setEnvironment()', 'getConfiguration()', 'setConfiguration()', 'openConnection()', 'closeConnection()', 'startTimer()', 'stopTimer()', 'scheduleTask()', 'executeTask()', 'abortTask()', 'completeTask()', 'processRequest()', 'handleResponse()', 'validateResponse()', 'transformData()', 'filterData()', 'sortData()', 'searchData()', 'updateData()', 'deleteData()', 'createData()', 'fetchData()', 'storeData()', 'retrieveData()', 'serializeData()', 'deserializeData()', 'encodeData()', 'decodeData()', 'compressData()', 'decompressData()', 'encryptData()', 'decryptData()', 'signData()', 'verifySignature()', 'generateKey()', 'validateKey()', 'authenticateToken()', 'refreshToken()', 'revokeToken()', 'loginUser()', 'logoutUser()', 'registerUser()', 'updateUser()', 'deleteUser()', 'getUser()', 'listUsers()', 'searchUsers()', 'filterUsers()', 'sortUsers()', 'validateUser()', 'authorizeUser()', 'checkAccess()', 'grantAccess()', 'revokeAccess()', 'updatePermission()', 'createPermission()', 'deletePermission()', 'getPermission()', 'listPermissions()', 'searchPermissions()', 'filterPermissions()', 'sortPermissions()', 'validatePermission()', 'authorizePermission()', 'checkPermission()', 'grantPermission()', 'revokePermission()', 'updateRole()', 'createRole()', 'deleteRole()', 'getRole()', 'listRoles()', 'searchRoles()', 'filterRoles()', 'sortRoles()', 'validateRole()', 'authorizeRole()', 'checkRole()', 'grantRole()', 'revokeRole()', 'createSession()', 'destroySession()', 'validateSession()', 'refreshSession()', 'getSessions()', 'listSessions()', 'searchSessions()', 'filterSessions()', 'sortSessions()', 'updateSession()', 'expireSession()', 'renewSession()', 'checkSession()', 'createToken()', 'validateToken()', 'refreshToken()', 'revokeToken()', 'generateToken()', 'getToken()', 'setToken()', 'removeToken()', 'clearTokens()', 'getTokenInfo()', 'getUserInfo()', 'getDeviceInfo()', 'getAppInfo()', 'getSystemInfo()', 'getNetworkInfo()', 'getStorageInfo()', 'getMemoryInfo()', 'getCpuInfo()', 'getGpuInfo()', 'getBatteryInfo()', 'getGeolocation()', 'getCamera()', 'getMicrophone()', 'getSpeaker()', 'getBluetooth()', 'getWifi()', 'getNfc()', 'getGps()', 'getSensors()', 'getCamera()', 'getMicrophone()', 'getSpeaker()', 'getBluetooth()', 'getWifi()', 'getNfc()', 'getGps()', 'getSensors()'];
            const errors = ['Error: Invalid user credentials', 'Error: Database connection failed', 'Error: UI rendering error', 'Error: Network timeout', 'Error: Security violation', 'Error: Memory leak detected', 'Error: Stack overflow', 'Error: Out of memory', 'Error: Invalid parameter', 'Error: Null reference', 'Error: Division by zero', 'Error: File not found', 'Error: Permission denied', 'Error: Timeout occurred', 'Error: License expired', 'Error: Invalid certificate', 'Error: Authentication failed', 'Error: Authorization required', 'Error: Session timeout', 'Error: Invalid token', 'Error: Cache miss', 'Error: Resource deadlock', 'Error: Invalid memory access', 'Error: Stack corruption', 'Error: Invalid instruction', 'Error: Memory allocation failed', 'Error: Invalid pointer', 'Error: Buffer overflow', 'Error: Invalid array access', 'Error: Invalid class instantiation', 'Error: Invalid method call', 'Error: Invalid property access', 'Error: Invalid interface implementation', 'Error: Invalid inheritance', 'Error: Invalid polymorphism', 'Error: Invalid encapsulation', 'Error: Invalid abstraction', 'Error: Invalid module loading', 'Error: Invalid dependency', 'Error: Circular dependency', 'Error: Missing dependency', 'Error: Invalid configuration file', 'Error: Invalid environment variable', 'Error: Invalid system path', 'Error: Invalid user input', 'Error: Invalid data type', 'Error: Invalid data structure', 'Error: Invalid algorithm', 'Error: Invalid logic flow', 'Error: Invalid conditional statement', 'Error: Invalid loop structure', 'Error: Invalid function signature', 'Error: Invalid parameter count', 'Error: Invalid return type', 'Error: Invalid exception handling', 'Error: Invalid error propagation', 'Error: Invalid error recovery', 'Error: Invalid error reporting', 'Error: Invalid error logging', 'Error: Invalid error monitoring', 'Error: Invalid error alerting', 'Error: Invalid error notification', 'Error: Invalid error resolution', 'Error: Invalid error tracking', 'Error: Invalid error categorization', 'Error: Invalid error classification', 'Error: Invalid error priority', 'Error: Invalid error severity', 'Error: Invalid error impact', 'Error: Invalid error mitigation', 'Error: Invalid error prevention', 'Error: Invalid error detection', 'Error: Invalid error resolution', 'Error: Invalid error recovery', 'Error: Invalid error reporting', 'Error: Invalid error logging', 'Error: Invalid error monitoring', 'Error: Invalid error alerting', 'Error: Invalid error notification', 'Error: Invalid error resolution', 'Error: Invalid error tracking', 'Error: Invalid error categorization', 'Error: Invalid error classification', 'Error: Invalid error priority', 'Error: Invalid error severity', 'Error: Invalid error impact', 'Error: Invalid error mitigation', 'Error: Invalid error prevention', 'Error: Invalid error detection'];
            
            const trace = [];
            trace.push('Stack trace:');
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + functions[Math.floor(Math.random() * functions.length)]);
            trace.push('  at ' + errors[Math.floor(Math.random() * errors.length)]);
            
            return trace.join('\n');
        }

        // Check for cascading failures
        function checkCascadingFailure() {
            // Check if we've had 3 consecutive stack traces in the last 10 seconds
            if (gameState.stackTraces.length >= gameState.cascadeThreshold) {
                gameState.cascadeCount++;
                if (gameState.cascadeCount >= gameState.cascadeThreshold) {
                    enterVoidMode();
                }
            }
        }

        // Start the timer
        function startTimer() {
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                document.getElementById('time-left').textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timer);
                    enterVoidMode();
                }
            }, 1000);
        }

        // Trigger the fix button trap
        function triggerFixTrap() {
            if (gameState.voidMode) return;

            // Make things worse when the fix button is clicked
            const trapMessage = 'ERROR: Fix button is a trap! System degradation initiated.';
            const trapTrace = generateStackTrace();
            document.getElementById('stack-trace-count').textContent = parseInt(document.getElementById('stack-trace-count').textContent) + 1;
            gameState.stackTraces.push(trapTrace);

            // Add to all components
            for (let i = 1; i <= 6; i++) {
                const stackTrace = document.getElementById(`stack-trace-${i}`);
                stackTrace.textContent += trapMessage + '\n' + trapTrace + '\n';
                
                // Apply wobble effect
                const component = document.getElementById(`component-${i}`);
                component.classList.add('wobble');
                setTimeout(() => {
                    component.classList.remove('wobble');
                }, 500);
            }

            // Add extra errors
            for (let i = 1; i <= 3; i++) {
                triggerError(Math.floor(Math.random() * 6) + 1);
            }

            // Decrease system health rapidly
            gameState.systemHealth = Math.max(0, gameState.systemHealth - 30);
            document.getElementById('system-health').textContent = gameState.systemHealth;

            // Check for cascading failure
            checkCascadingFailure();
        }

        // Enter void mode
        function enterVoidMode() {
            gameState.voidMode = true;
            document.getElementById('void-mode').style.display = 'block';
            document.body.classList.add('glitch');
            
            // Stop the timer
            if (gameState.timer) {
                clearInterval(gameState.timer);
            }
            
            // Add final stack traces to make it look like a complete system collapse
            for (let i = 1; i <= 6; i++) {
                const stackTrace = document.getElementById(`stack-trace-${i}`);
                stackTrace.textContent += 'System collapse: ' + generateStackTrace() + '\n';
            }
            
            // Add audio effect for void mode
            playVoidSound();
        }

        // Play void sound effect
        function playVoidSound() {
            // Create audio context for glitch effect
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Create a simple glitch sound
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();
                
                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);
                
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(200, audioContext.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 2);
                
                gainNode.gain.setValueAtTime(0.5, audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + 2);
                
                oscillator.start(audioContext.currentTime);
                oscillator.stop(audioContext.currentTime + 2);
                
            } catch (e) {
                console.log("Audio not supported in this browser");
            }
        }

        // Initialize when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
