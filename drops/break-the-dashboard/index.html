<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        #dashboard {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 20px #0f0; }
            50% { box-shadow: 0 0 30px #0f0, 0 0 40px #0f0; }
            100% { box-shadow: 0 0 20px #0f0; }
        }
        
        #header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
            animation: glitch 5s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        #stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0, 20, 0, 0.7);
            border: 1px solid #0f0;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 120px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        
        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #0a0;
        }
        
        #error-container {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #f00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        
        .error-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #f00;
            animation: wobble 0.5s infinite alternate;
        }
        
        @keyframes wobble {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }
        
        #components {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .component {
            background: rgba(0, 0, 20, 0.7);
            border: 1px solid #00f;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .component:hover {
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .component-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #0af;
        }
        
        .component-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        #fix-button {
            background: #f00;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
            text-align: center;
            box-shadow: 0 0 15px #f00;
            transition: all 0.3s;
            animation: pulse-button 2s infinite;
        }
        
        #fix-button:hover {
            background: #ff5555;
            box-shadow: 0 0 25px #ff5555;
        }
        
        @keyframes pulse-button {
            0% { box-shadow: 0 0 15px #f00; }
            50% { box-shadow: 0 0 25px #f00, 0 0 35px #f00; }
            100% { box-shadow: 0 0 15px #f00; }
        }
        
        #void-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 2s;
        }
        
        #void-mode.show {
            display: flex;
            opacity: 1;
        }
        
        #void-text {
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
            animation: glitch 1s infinite;
        }
        
        #void-subtext {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        #void-timer {
            font-size: 36px;
            margin-bottom: 30px;
            color: #f00;
            text-shadow: 0 0 10px #f00;
        }
        
        #void-sound {
            background: #0f0;
            color: #000;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 20px;
        }
        
        #void-sound.playing {
            background: #0f0;
            box-shadow: 0 0 15px #0f0;
        }
        
        #void-sound.paused {
            background: #888;
            box-shadow: 0 0 15px #888;
        }
        
        #void-collapse {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 2000;
            opacity: 0;
            transition: opacity 1s;
        }
        
        #void-collapse.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <h1 id="header">CREATE YOUR OWN CREW</h1>
        <p style="text-align: center; margin-top: 10px;">PUBLIC CREW GALLERY</p>
        
        <div id="stats">
            <div class="stat-box">
                <div class="stat-value" id="error-count">0</div>
                <div class="stat-label">ERRORS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stack-count">0</div>
                <div class="stat-label">STACK TRACES</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="timer">00:00</div>
                <div class="stat-label">TIME</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="component-count">0</div>
                <div class="stat-label">COMPONENTS</div>
            </div>
        </div>
        
        <div id="error-container">
            <!-- Error messages will appear here -->
        </div>
        
        <div id="components">
            <div class="component">
                <div class="component-title">SYSTEM STATUS</div>
                <div class="component-value" id="system-status">OK</div>
            </div>
            <div class="component">
                <div class="component-title">NETWORK</div>
                <div class="component-value" id="network">STABLE</div>
            </div>
            <div class="component">
                <div class="component-title">MEMORY</div>
                <div class="component-value" id="memory">87%</div>
            </div>
            <div class="component">
                <div class="component-title">CPU</div>
                <div class="component-value" id="cpu">42%</div>
            </div>
            <div class="component">
                <div class="component-title">DISK</div>
                <div class="component-value" id="disk">63%</div>
            </div>
        </div>
        
        <button id="fix-button" onclick="fixButtonClicked()">FIX BUTTON</button>
    </div>
    
    <div id="void-mode">
        <div id="void-text">VOID MODE</div>
        <div id="void-subtext">THE SYSTEM IS COLLAPSING...</div>
        <div id="void-timer">00:10</div>
        <button id="void-sound" onclick="toggleSound()">SOUND: ON</button>
    </div>
    
    <div id="void-collapse"></div>
    
    <script>
        // Game state
        window.gameState = {
            errorCount: 0,
            stackCount: 0,
            startTime: Date.now(),
            timer: 0,
            componentCount: 5,
            voidMode: false,
            soundPlaying: true,
            stackTraceTimes: [], // Array to track stack trace timestamps
            audioContext: null
        };
        
        // Initialize the game
        function initGame() {
            setupSound();
            setInterval(updateTimer, 1000);
            setInterval(updateComponents, 1000);
            setInterval(updateErrorDisplay, 500);
            setInterval(updateStackCount, 1000);
            updateTimer();
            updateComponents();
        }
        
        // Update the timer
        function updateTimer() {
            if (window.gameState.voidMode) return;
            
            window.gameState.timer = Math.floor((Date.now() - window.gameState.startTime) / 1000);
            const minutes = Math.floor(window.gameState.timer / 60);
            const seconds = window.gameState.timer % 60;
            document.getElementById('timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Trigger an error
        function triggerError(error) {
            if (window.gameState.voidMode) return;
            
            window.gameState.errorCount++;
            document.getElementById('error-count').textContent = window.gameState.errorCount;
            
            const errorContainer = document.getElementById('error-container');
            const errorItem = document.createElement('div');
            errorItem.className = 'error-item';
            errorItem.textContent = `[${new Date().toLocaleTimeString()}] ${error}`;
            errorContainer.appendChild(errorItem);
            errorContainer.scrollTop = errorContainer.scrollHeight;
            
            // Add stack trace sometimes (simulating real errors)
            if (Math.random() > 0.7) {
                triggerStackTrace();
            }
        }
        
        // Trigger a stack trace
        function triggerStackTrace() {
            if (window.gameState.voidMode) return;
            
            window.gameState.stackCount++;
            document.getElementById('stack-count').textContent = window.gameState.stackCount;
            
            // Add to stack trace times
            window.gameState.stackTraceTimes.push(Date.now());
            
            // Keep only last 3 stack trace times
            if (window.gameState.stackTraceTimes.length > 3) {
                window.gameState.stackTraceTimes.shift();
            }
            
            // Check if 3 consecutive stack traces in 10 seconds
            if (window.gameState.stackTraceTimes.length >= 3) {
                const latest = window.gameState.stackTraceTimes[window.gameState.stackTraceTimes.length - 1];
                const thirdLatest = window.gameState.stackTraceTimes[window.gameState.stackTraceTimes.length - 3];
                
                if (latest - thirdLatest <= 10000) {
                    activateVoidMode();
                }
            }
        }
        
        // Update components with random values
        function updateComponents() {
            if (window.gameState.voidMode) return;
            
            const components = document.querySelectorAll('.component-value');
            components.forEach(component => {
                if (component.id === 'system-status') {
                    const statuses = ['OK', 'WARNING', 'CRITICAL'];
                    component.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                } else if (component.id === 'network') {
                    const statuses = ['STABLE', 'SLOW', 'UNRELIABLE'];
                    component.textContent = statuses[Math.floor(Math.random() * statuses.length)];
                } else {
                    component.textContent = Math.floor(Math.random() * 100) + '%';
                }
            });
        }
        
        // Fix button clicked (trap!)
        function fixButtonClicked() {
            triggerError("FIX BUTTON TRAP");
            triggerError("SYSTEM CRASH");
            triggerError("UNEXPECTED ERROR");
            
            // Add visual feedback to the button
            const button = document.getElementById('fix-button');
            button.style.background = '#ff0000';
            button.style.animation = 'pulse-button 0.5s infinite';
            
            setTimeout(() => {
                button.style.background = '#f00';
                button.style.animation = 'pulse-button 2s infinite';
            }, 500);
        }
        
        // Activate void mode
        function activateVoidMode() {
            window.gameState.voidMode = true;
            window.gameState.voidTimer = 10; // 10 seconds to collapse
        
            document.getElementById('void-mode').classList.add('show');
            document.getElementById('void-timer').textContent = '00:10';
            
            // Play glitch audio
            playGlitchAudio();
            
            // Start void timer countdown
            setInterval(updateVoidTimer, 1000);
        }
        
        // Update void timer display
        function updateVoidTimer() {
            if (!window.gameState.voidMode) return;
            
            window.gameState.voidTimer--;
            const minutes = Math.floor(window.gameState.voidTimer / 60);
            const seconds = window.gameState.voidTimer % 60;
            document.getElementById('void-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            // Collapse when timer reaches 0
            if (window.gameState.voidTimer <= 0) {
                collapseVoidMode();
            }
        }
        
        // Collapse void mode
        function collapseVoidMode() {
            const collapse = document.getElementById('void-collapse');
            collapse.classList.add('show');
            
            // Hide everything except the collapse overlay
            document.getElementById('dashboard').style.display = 'none';
        }
        
        // Setup sound
        function setupSound() {
            // Create audio context
            window.gameState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Toggle sound
        function toggleSound() {
            const soundButton = document.getElementById('void-sound');
            window.gameState.soundPlaying = !window.gameState.soundPlaying;
            
            if (window.gameState.soundPlaying) {
                soundButton.classList.add('playing');
                soundButton.classList.remove('paused');
                soundButton.textContent = 'SOUND: ON';
                playGlitchAudio();
            } else {
                soundButton.classList.add('paused');
                soundButton.classList.remove('playing');
                soundButton.textContent = 'SOUND: OFF';
                // Stop audio
                if (window.gameState.soundElement) {
                    window.gameState.soundElement.pause();
                }
            }
        }
        
        // Play glitch audio effect
        function playGlitchAudio() {
            if (!window.gameState.soundPlaying) return;
            
            // Create a simple glitch effect using Web Audio API
            const oscillator = window.gameState.audioContext.createOscillator();
            const gainNode = window.gameState.audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(window.gameState.audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, window.gameState.audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1000, window.gameState.audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, window.gameState.audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.1);
            
            oscillator.start(window.gameState.audioContext.currentTime);
            oscillator.stop(window.gameState.audioContext.currentTime + 0.1);
            
            // Add some random distortion
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const distortion = window.gameState.audioContext.createOscillator();
                    const distortionGain = window.gameState.audioContext.createGain();
                    
                    distortion.connect(distortionGain);
                    distortionGain.connect(window.gameState.audioContext.destination);
                    
                    distortion.type = 'square';
                    distortion.frequency.setValueAtTime(50 + Math.random() * 100, window.gameState.audioContext.currentTime);
                    distortionGain.gain.setValueAtTime(0.5, window.gameState.audioContext.currentTime);
                    distortionGain.gain.exponentialRampToValueAtTime(0.01, window.gameState.audioContext.currentTime + 0.05);
                    
                    distortion.start(window.gameState.audioContext.currentTime);
                    distortion.stop(window.gameState.audioContext.currentTime + 0.05);
                }, i * 200);
            }
        }
        
        // Initialize the game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
