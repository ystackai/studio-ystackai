<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }
        
        body {
            background-color: #000;
            color: #0f0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        #dashboard {
            position: relative;
            width: 100%;
            height: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            box-shadow: 0 0 20px #0f0;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 20px #0f0; }
            50% { box-shadow: 0 0 30px #0f0, 0 0 40px #0f0; }
            100% { box-shadow: 0 0 20px #0f0; }
        }
        
        #header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 24px;
            text-shadow: 0 0 10px #0f0;
            animation: glitch 5s infinite;
        }
        
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        #stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .stat-box {
            background: rgba(0, 20, 0, 0.7);
            border: 1px solid #0f0;
            padding: 15px;
            margin: 10px;
            border-radius: 5px;
            text-align: center;
            min-width: 120px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 0 0 5px #0f0;
        }
        
        .stat-label {
            font-size: 12px;
            margin-top: 5px;
            color: #0a0;
        }
        
        #error-container {
            background: rgba(20, 0, 0, 0.7);
            border: 1px solid #f00;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.3);
        }
        
        .error-item {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #f00;
            animation: wobble 0.5s infinite alternate;
        }
        
        @keyframes wobble {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }
        
        #components {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .component {
            background: rgba(0, 0, 20, 0.7);
            border: 1px solid #00f;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }
        
        .component:hover {
            animation: spin 1s infinite linear;
        }
        
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .component-title {
            font-size: 16px;
            margin-bottom: 10px;
            color: #0af;
        }
        
        .component-value {
            font-size: 20px;
            font-weight: bold;
        }
        
        #fix-button {
            background: #f00;
            color: #fff;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            margin: 20px auto;
            display: block;
            text-align: center;
            box-shadow: 0 0 15px #f00;
            transition: all 0.3s;
            animation: pulse-button 2s infinite;
        }
        
        #fix-button:hover {
            background: #ff5555;
            box-shadow: 0 0 25px #ff5555;
        }
        
        @keyframes pulse-button {
            0% { box-shadow: 0 0 15px #f00; }
            50% { box-shadow: 0 0 25px #f00, 0 0 35px #f00; }
            100% { box-shadow: 0 0 15px #f00; }
        }
        
        #void-mode {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 2s;
        }
        
        #void-mode.show {
            display: flex;
            opacity: 1;
        }
        
        #void-text {
            font-size: 48px;
            text-align: center;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 20px;
            animation: glitch 1s infinite;
        }
        
        #void-subtext {
            font-size: 24px;
            text-align: center;
            margin-bottom: 30px;
            animation: pulse 3s infinite;
        }
        
        #void-timer {
            font-size: 36px;
            animation: pulse 1s infinite;
        }
        
        #void-sound {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #000;
            border: 1px solid #0f0;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        
        #void-sound.playing {
            animation: spin 1s infinite linear;
        }
        
        #void-sound::before {
            content: "🔊";
        }
        
        #void-sound.paused::before {
            content: "🔇";
        }
        
        .glitch-text {
            animation: glitch 5s infinite;
        }
        
        .error-counter {
            color: #f00;
            font-weight: bold;
        }
        
        .warning-counter {
            color: #ff0;
            font-weight: bold;
        }
        
        .info-counter {
            color: #0ff;
            font-weight: bold;
        }
        
        #timer {
            font-size: 24px;
            text-align: center;
            margin: 20px 0;
            color: #0f0;
            text-shadow: 0 0 10px #0f0;
        }
    </style>
</head>
<body>
    <div id="dashboard">
        <div id="header">
            <h1>SYSTEM DASHBOARD</h1>
            <p class="glitch-text">ERROR DETECTION INTERFACE v2.7.4</p>
        </div>
        
        <div id="timer">Time Remaining: <span id="time-remaining">60</span>s</div>
        
        <div id="stats">
            <div class="stat-box">
                <div class="stat-value error-counter" id="error-count">0</div>
                <div class="stat-label">ERRORS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value warning-counter" id="warning-count">0</div>
                <div class="stat-label">WARNINGS</div>
            </div>
            <div class="stat-box">
                <div class="stat-value info-counter" id="info-count">0</div>
                <div class="stat-label">INFO</div>
            </div>
            <div class="stat-box">
                <div class="stat-value" id="stack-trace-count">0</div>
                <div class="stat-label">STACK TRACES</div>
            </div>
        </div>
        
        <div id="error-container">
            <h3>ACTIVE ERRORS</h3>
            <div id="error-list"></div>
        </div>
        
        <div id="components">
            <div class="component" onclick="triggerError('Component A')">
                <div class="component-title">Component A</div>
                <div class="component-value">Status: <span id="comp-a-status">OK</span></div>
            </div>
            <div class="component" onclick="triggerError('Component B')">
                <div class="component-title">Component B</div>
                <div class="component-value">Status: <span id="comp-b-status">OK</span></div>
            </div>
            <div class="component" onclick="triggerError('Component C')">
                <div class="component-title">Component C</div>
                <div class="component-value">Status: <span id="comp-c-status">OK</span></div>
            </div>
            <div class="component" onclick="triggerError('Component D')">
                <div class="component-title">Component D</div>
                <div class="component-value">Status: <span id="comp-d-status">OK</span></div>
            </div>
            <div class="component" onclick="triggerError('Component E')">
                <div class="component-title">Component E</div>
                <div class="component-value">Status: <span id="comp-e-status">OK</span></div>
            </div>
        </div>
        
        <button id="fix-button" onclick="fixButtonClicked()">FIX BUTTON (TRAP)</button>
    </div>
    
    <div id="void-mode">
        <div id="void-text">CURATED VOID</div>
        <div id="void-subtext">SYSTEM COLLAPSE IMMINENT</div>
        <div id="void-timer">00:00</div>
    </div>
    
    <div id="void-sound"></div>
    
    <script>
        // Game state
        window.gameState = {
            errors: 0,
            warnings: 0,
            info: 0,
            stackTraces: 0,
            stackTraceCount: 0,
            stackTraceHistory: [],
            timeRemaining: 60,
            voidMode: false,
            voidTimer: 0,
            soundPlaying: false
        };
        
        // Audio context for glitch effects
        let audioContext;
        let soundElement;
        
        // Initialize the game
        function initGame() {
            updateStats();
            startTimer();
            setupSound();
        }
        
        // Update stats display
        function updateStats() {
            document.getElementById('error-count').textContent = window.gameState.errors;
            document.getElementById('warning-count').textContent = window.gameState.warnings;
            document.getElementById('info-count').textContent = window.gameState.info;
            document.getElementById('stack-trace-count').textContent = window.gameState.stackTraces;
        }
        
        // Start the main timer
        function startTimer() {
            const timer = setInterval(() => {
                if (window.gameState.voidMode) {
                    window.gameState.voidTimer--;
                    updateVoidTimer();
                    if (window.gameState.voidTimer <= 0) {
                        // Final collapse
                        document.getElementById('void-mode').classList.add('show');
                        document.body.style.background = '#000';
                        document.body.style.color = '#000';
                        document.body.style.animation = 'none';
                        window.gameState.voidMode = false;
                    }
                } else {
                    window.gameState.timeRemaining--;
                    document.getElementById('time-remaining').textContent = window.gameState.timeRemaining;
                    
                    if (window.gameState.timeRemaining <= 0) {
                        clearInterval(timer);
                        triggerError("SYSTEM TIMEOUT");
                    }
                }
            }, 1000);
        }
        
        // Trigger an error
        function triggerError(source) {
            // Add error to the counter
            window.gameState.errors++;
            
            // Add warning every 3 errors
            if (window.gameState.errors % 3 === 0) {
                window.gameState.warnings++;
            }
            
            // Add info every 5 errors
            if (window.gameState.errors % 5 === 0) {
                window.gameState.info++;
            }
            
            // Add stack trace every 2 errors
            if (window.gameState.errors % 2 === 0) {
                window.gameState.stackTraces++;
                window.gameState.stackTraceHistory.push(Date.now());
                
                // Check for cascade effect
                if (window.gameState.stackTraceHistory.length >= 3) {
                    const latest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 1];
                    const secondLatest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 2];
                    const thirdLatest = window.gameState.stackTraceHistory[window.gameState.stackTraceHistory.length - 3];
                    
                    // If last 3 stack traces were within 10 seconds
                    if (latest - thirdLatest <= 10000) {
                        activateVoidMode();
                    }
                }
            }
            
            // Add error to display
            const errorList = document.getElementById('error-list');
            const errorItem = document.createElement('div');
            errorItem.className = 'error-item';
            errorItem.innerHTML = `<strong>${source}</strong>: ${getErrorDescription()} [${new Date().toLocaleTimeString()}]`;
            errorList.appendChild(errorItem);
            
            // Scroll to bottom
            errorList.scrollTop = errorList.scrollHeight;
            
            // Update display
            updateStats();
            
            // Add wobbling effect to components
            const components = document.querySelectorAll('.component');
            components.forEach(comp => {
                comp.style.animation = 'none';
                setTimeout(() => {
                    comp.style.animation = 'float 3s ease-in-out infinite';
                }, 10);
            });
            
            // Add glitch effect to dashboard
            document.getElementById('dashboard').style.animation = 'none';
            setTimeout(() => {
                document.getElementById('dashboard').style.animation = 'pulse 2s infinite';
            }, 10);
        }
        
        // Get random error description
        function getErrorDescription() {
            const descriptions = [
                "Stack overflow detected",
                "Memory allocation failed",
                "Component initialization error",
                "Resource leak detected",
                "Null pointer dereference",
                "Buffer overflow",
                "Invalid state transition",
                "Critical system failure",
                "Module not found",
                "Configuration error",
                "Security violation",
                "Data corruption detected",
                "Connection timeout",
                "Service unavailable",
                "Authentication failed"
            ];
            return descriptions[Math.floor(Math.random() * descriptions.length)];
        }
        
        // Fix button clicked (trap!)
        function fixButtonClicked() {
            triggerError("FIX BUTTON TRAP");
            triggerError("SYSTEM CRASH");
            triggerError("UNEXPECTED ERROR");
            
            // Add visual feedback to the button
            const button = document.getElementById('fix-button');
            button.style.background = '#ff0000';
            button.style.animation = 'pulse-button 0.5s infinite';
            
            setTimeout(() => {
                button.style.background = '#f00';
                button.style.animation = 'pulse-button 2s infinite';
            }, 500);
        }
        
        // Activate void mode
        function activateVoidMode() {
            window.gameState.voidMode = true;
            window.gameState.voidTimer = 10; // 10 seconds to collapse
            
            document.getElementById('void-mode').classList.add('show');
            document.getElementById('void-timer').textContent = '00:10';
            
            // Play glitch audio
            playGlitchAudio();
        }
        
        // Update void timer display
        function updateVoidTimer() {
            const minutes = Math.floor(window.gameState.voidTimer / 60);
            const seconds = window.gameState.voidTimer % 60;
            document.getElementById('void-timer').textContent = 
                `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        // Setup sound
        function setupSound() {
            const soundButton = document.getElementById('void-sound');
            soundButton.addEventListener('click', toggleSound);
            
            // Create audio context
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        
        // Toggle sound
        function toggleSound() {
            const soundButton = document.getElementById('void-sound');
            window.gameState.soundPlaying = !window.gameState.soundPlaying;
            
            if (window.gameState.soundPlaying) {
                soundButton.classList.add('playing');
                soundButton.classList.remove('paused');
                playGlitchAudio();
            } else {
                soundButton.classList.add('paused');
                soundButton.classList.remove('playing');
                // Stop audio
                if (soundElement) {
                    soundElement.pause();
                }
            }
        }
        
        // Play glitch audio effect
        function playGlitchAudio() {
            if (!window.gameState.soundPlaying) return;
            
            // Create audio elements for glitch effects
            if (soundElement) {
                soundElement.pause();
            }
            
            // Create a simple glitch effect using Web Audio API
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = 'sawtooth';
            oscillator.frequency.setValueAtTime(100, audioContext.currentTime);
            oscillator.frequency.exponentialRampToValueAtTime(1000, audioContext.currentTime + 0.1);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
            
            // Add some random distortion
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const distortion = audioContext.createOscillator();
                    const distortionGain = audioContext.createGain();
                    
                    distortion.connect(distortionGain);
                    distortionGain.connect(audioContext.destination);
                    
                    distortion.type = 'square';
                    distortion.frequency.setValueAtTime(50 + Math.random() * 100, audioContext.currentTime);
                    distortionGain.gain.setValueAtTime(0.5, audioContext.currentTime);
                    distortionGain.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.05);
                    
                    distortion.start(audioContext.currentTime);
                    distortion.stop(audioContext.currentTime + 0.05);
                }, i * 200);
            }
        }
        
        // Initialize the game when page loads
        window.addEventListener('load', initGame);
    </script>
</body>
</html>
