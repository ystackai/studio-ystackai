<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Break the Dashboard</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        #dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        .component {
            background-color: #111;
            border: 1px solid #0f0;
            padding: 10px;
            border-radius: 4px;
            transition: all 0.1s ease;
        }
        .component.wobbling {
            animation: wobble 0.1s infinite alternate;
        }
        @keyframes wobble {
            0% { transform: translateX(0); }
            100% { transform: translateX(5px); }
        }
        #error-counter {
            font-size: 2em;
            text-align: center;
            margin: 20px 0;
        }
        #void-mode {
            display: none;
            text-align: center;
            font-size: 2em;
            color: #f00;
        }
        #fix-button {
            background-color: #ff0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            font-family: 'Courier New', monospace;
            font-size: 1.2em;
            cursor: pointer;
            margin: 20px 0;
        }
        #fix-button:hover {
            background-color: #ff3333;
        }
        #timer {
            font-size: 1.5em;
            text-align: center;
            margin: 20px 0;
        }
        #stack-trace {
            background-color: #222;
            border: 1px solid #0f0;
            padding: 10px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        #stack-trace p {
            margin: 5px 0;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <h1>Break the Dashboard</h1>
    
    <div id="error-counter">Errors: 0</div>
    <div id="timer">Time: 10:00</div>
    
    <div id="dashboard">
        <div class="component" onclick="triggerError(this)">Error Source 1</div>
        <div class="component" onclick="triggerError(this)">Error Source 2</div>
        <div class="component" onclick="triggerError(this)">Error Source 3</div>
        <div class="component" onclick="triggerError(this)">Error Source 4</div>
        <div class="component" onclick="triggerError(this)">Error Source 5</div>
    </div>
    
    <button id="fix-button" onclick="triggerFix()">Fix Button (Trap!)</button>
    
    <div id="stack-trace"></div>
    
    <div id="void-mode">
        <p>VOID MODE ACTIVATED</p>
        <p>SYSTEM COLLAPSE IN PROGRESS</p>
    </div>

    <script src="audio/audio-system.js"></script>
    <script>
        // Game state
        let gameState = {
            errors: 0,
            stackTraces: [],
            voidMode: false,
            timer: 600, // 10 minutes in seconds
            lastTraceTime: 0,
            consecutiveTraces: 0,
            traceTimeout: null
        };

        // Initialize audio system
        window.audioSystem = new AudioSystem();

        function triggerError(component) {
            // Play wobble sound
            window.audioSystem.playWobbleSound();

            // Add error
            gameState.errors++;
            document.getElementById('error-counter').textContent = `Errors: ${gameState.errors}`;
            
            // Add stack trace
            const stackTrace = generateStackTrace();
            gameState.stackTraces.push(stackTrace);
            addStackTrace(stackTrace);
            
            // Wobble component
            component.classList.add('wobbling');
            setTimeout(() => {
                component.classList.remove('wobbling');
            }, 100);
            
            // Play wobble sound
            window.audioSystem.playWobbleSound();
            
            // Update error counter
            document.getElementById('error-counter').textContent = `Errors: ${gameState.errors}`;
            
            // Check for void mode
            checkVoidMode();
            
            // Play error sound
            window.audioSystem.playErrorSound();
        }

        function triggerFix() {
            // This is a trap - makes things worse!
            gameState.errors += 3;
            document.getElementById('error-counter').textContent = `Errors: ${gameState.errors}`;
            
            // Add multiple stack traces
            for (let i = 0; i < 3; i++) {
                const stackTrace = generateStackTrace();
                gameState.stackTraces.push(stackTrace);
                addStackTrace(stackTrace);
            }
            
            // Play trap sound
            window.audioSystem.playTrapSound();
            
            // Check for void mode
            checkVoidMode();
        }

        function generateStackTrace() {
            const errors = [
                "ReferenceError: Cannot access 'x' before initialization",
                "TypeError: Cannot read property 'length' of undefined",
                "SyntaxError: Unexpected token '}'",
                "RangeError: Maximum call stack size exceeded",
                "DOMException: Failed to execute 'appendChild' on 'Node'",
                "Error: Invalid state transition",
                "Uncaught (in promise) TypeError: Cannot read property 'foo' of null",
                "Error: Stack overflow detected"
            ];
            
            const randomError = errors[Math.floor(Math.random() * errors.length)];
            const timestamp = new Date().toISOString();
            
            return `${randomError} at ${timestamp}`;
        }

        function addStackTrace(trace) {
            const stackTraceElement = document.getElementById('stack-trace');
            const traceElement = document.createElement('p');
            traceElement.textContent = trace;
            stackTraceElement.appendChild(traceElement);
            
            // Keep only last 20 traces
            if (stackTraceElement.children.length > 20) {
                stackTraceElement.removeChild(stackTraceElement.firstChild);
            }
        }

        function checkVoidMode() {
            const now = Date.now();
            if (gameState.lastTraceTime && (now - gameState.lastTraceTime) < 10000) {
                gameState.consecutiveTraces++;
            } else {
                gameState.consecutiveTraces = 1;
            }
            
            gameState.lastTraceTime = now;
            
            if (gameState.consecutiveTraces >= 3) {
                activateVoidMode();
            }
        }

        function activateVoidMode() {
            gameState.voidMode = true;
            document.getElementById('void-mode').style.display = 'block';
            
            // Play void sound
            window.audioSystem.playVoidSound();
            
            // Start silence countdown
            setTimeout(() => {
                window.audioSystem.silence();
            }, 3000);
        }

        function updateTimer() {
            if (gameState.voidMode) return;
            
            gameState.timer--;
            const minutes = Math.floor(gameState.timer / 60);
            const seconds = gameState.timer % 60;
            document.getElementById('timer').textContent = `Time: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            
            if (gameState.timer <= 0) {
                activateVoidMode();
            }
        }

        // Start timer
        setInterval(updateTimer, 1000);
        
        // Initialize audio system
        window.audioSystem.init();
        
        // Play ambient sound periodically
        setInterval(() => {
            if (!gameState.voidMode) {
                window.audioSystem.createAmbientSounds();
            }
        }, 2000);
        
        // Play glitch sound occasionally
        setInterval(() => {
            if (!gameState.voidMode) {
                window.audioSystem.playGlitchSound();
            }
        }, 5000);
    </script>
</body>
</html>
