<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crew Factory</title>
    <style>
        /* Factory floor styling */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', monospace;
        }

        body {
            background: #1a1a1a;
            color: #e0e0e0;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        .factory-floor {
            background: linear-gradient(180deg, #2c2c2c 0%, #1a1a1a 100%);
            height: 100vh;
            position: relative;
            overflow: hidden;
            border: 1px solid #444;
        }

        .factory-floor::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 49%, rgba(0,0,0,0.1) 50%, transparent 51%),
                linear-gradient(transparent 49%, rgba(0,0,0,0.1) 50%, transparent 51%);
            background-size: 20px 20px;
            z-index: 1;
        }

        .factory-header {
            text-align: center;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7);
            border-bottom: 2px solid #ff5500;
            z-index: 2;
            position: relative;
        }

        .factory-title {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            color: #ff5500;
            text-shadow: 0 0 10px rgba(255, 85, 0, 0.5);
        }

        .factory-subtitle {
            font-size: 1.2rem;
            opacity: 0.8;
        }

        .landing-screen {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 100px);
            text-align: center;
            padding: 20px;
            z-index: 2;
            position: relative;
        }

        .landing-content {
            max-width: 800px;
            background: rgba(30, 30, 30, 0.9);
            padding: 30px;
            border: 2px solid #ff5500;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(255, 85, 0, 0.3);
        }

        .landing-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff5500;
        }

        .landing-text {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .create-crew-btn {
            background: linear-gradient(to bottom, #ff5500, #cc4400);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 85, 0, 0.4);
            font-weight: bold;
        }

        .create-crew-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 85, 0, 0.6);
        }

        .create-crew-btn:active {
            transform: translateY(1px);
        }

        .gallery-placeholder {
            display: none;
            text-align: center;
            padding: 30px;
            z-index: 2;
            position: relative;
        }

        .gallery-title {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ff5500;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery-item {
            background: rgba(50, 50, 50, 0.8);
            border: 1px solid #ff5500;
            border-radius: 5px;
            padding: 10px;
            height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .gallery-item:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(255, 85, 0, 0.5);
        }

        .gallery-item-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .gallery-item-name {
            font-size: 0.9rem;
        }

        .assembly-line {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            background: #333;
            border-top: 2px solid #ff5500;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1;
        }

        .assembly-line::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                linear-gradient(90deg, transparent 49%, rgba(255,85,0,0.2) 50%, transparent 51%);
            background-size: 30px 30px;
        }

        .assembly-line-text {
            font-size: 1.2rem;
            color: #ff5500;
            text-transform: uppercase;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="factory-floor">
        <div class="factory-header">
            <h1 class="factory-title">Crew Factory</h1>
            <p class="factory-subtitle">Assemble your crew in seconds</p>
        </div>

        <div class="landing-screen" id="landingScreen">
            <div class="landing-content">
                <h2 class="landing-title">Welcome to the Factory Floor</h2>
                <p class="landing-text">You are a crew. Create your own crew. No account needed. No setup required. Just press and go.</p>
                <button class="create-crew-btn" id="createCrewBtn">Create My Crew</button>
            </div>
        </div>

        <div class="gallery-placeholder" id="galleryPlaceholder">
            <h2 class="gallery-title">Public Crew Gallery</h2>
            <p>Explore crews created by other players. Click any crew to join it.</p>
            <div class="gallery-grid" id="galleryGrid">
                <!-- Gallery items will be populated by JavaScript -->
            </div>
        </div>

        <div class="assembly-line">
            <span class="assembly-line-text">Assembly Line Active</span>
        </div>
    </div>
