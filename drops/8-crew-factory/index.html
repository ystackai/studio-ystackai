<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Crew Factory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;500;700&display=swap');
:root{--bg:#0c0c0f;--surface:#16161a;--border:#2a2a30;--amber:#f59e0b;--amber-dim:#92610a;--red:#ef4444;--text:#e4e4e7;--muted:#6b6b76;--card:#1c1c22}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;height:100vh;overflow:hidden;touch-action:none}
canvas#bg{position:fixed;top:0;left:0;pointer-events:none;opacity:0.4}

/* Layout */
.app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}
header{padding:16px 24px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
header h1{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.25em;color:var(--amber);text-transform:uppercase}
header .count{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace}
.main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}

/* Title screen */
#title{text-align:center;transition:opacity 0.6s,transform 0.6s}
#title.exit{opacity:0;transform:translateY(-30px);pointer-events:none}
#title h2{font-size:clamp(32px,7vw,56px);font-weight:700;letter-spacing:-0.02em;line-height:1.1;margin-bottom:12px}
#title h2 span{color:var(--amber)}
#title p{color:var(--muted);font-size:clamp(13px,2.5vw,16px);margin-bottom:32px;font-weight:300}

/* The Button */
.btn-wrap{position:relative;display:inline-block}
.btn{background:none;border:2px solid var(--amber);color:var(--amber);font-family:'Space Mono',monospace;font-size:clamp(12px,2vw,14px);letter-spacing:0.2em;text-transform:uppercase;padding:14px 36px;cursor:pointer;position:relative;overflow:hidden;transition:all 0.3s}
.btn:hover{background:var(--amber);color:var(--bg);box-shadow:0 0 30px rgba(245,158,11,0.3)}
.btn:active{transform:scale(0.96)}
.btn.firing{animation:btn-flash 0.15s ease}
@keyframes btn-flash{0%{box-shadow:0 0 0 rgba(245,158,11,0)}50%{box-shadow:0 0 60px rgba(245,158,11,0.6)}100%{box-shadow:0 0 0 rgba(245,158,11,0)}}

/* Assembly line */
#assembly{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.4s}
#assembly.active{opacity:1;pointer-events:auto}
#conveyor{display:flex;gap:16px;align-items:center;justify-content:center;flex-wrap:wrap;max-width:700px;padding:20px}

/* Crew card */
.card{width:140px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:16px 12px;text-align:center;opacity:0;transform:translateY(40px) scale(0.8);transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
.card.in{opacity:1;transform:translateY(0) scale(1)}
.card .avatar{width:56px;height:56px;border-radius:50%;margin:0 auto 10px;position:relative;overflow:hidden}
.card .avatar canvas{width:100%;height:100%;border-radius:50%}
.card .name{font-weight:700;font-size:13px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .role{font-size:10px;color:var(--amber);letter-spacing:0.15em;text-transform:uppercase;font-family:'Space Mono',monospace}
.card .trait{font-size:10px;color:var(--muted);margin-top:6px;font-style:italic}

/* Gallery */
#gallery-btn{position:absolute;bottom:20px;right:24px;background:none;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;padding:8px 16px;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s}
#gallery-btn:hover{border-color:var(--amber);color:var(--amber)}
#gallery{position:absolute;inset:0;background:var(--bg);z-index:5;overflow-y:auto;padding:24px;display:none}
#gallery.open{display:block}
#gallery .gallery-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
#gallery h3{font-family:'Space Mono',monospace;font-size:13px;letter-spacing:0.15em;color:var(--amber);text-transform:uppercase}
#gallery .close{background:none;border:1px solid var(--border);color:var(--muted);padding:6px 14px;cursor:pointer;font-family:'Space Mono',monospace;font-size:11px}
#gallery .close:hover{border-color:var(--amber);color:var(--amber)}
.crew-row{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border)}
.crew-row .crew-label{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;margin-bottom:10px;letter-spacing:0.1em}
.crew-row .crew-cards{display:flex;gap:10px;flex-wrap:wrap}
.crew-row .mini-card{width:90px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 8px;text-align:center}
.crew-row .mini-card .m-name{font-size:10px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crew-row .mini-card .m-role{font-size:9px;color:var(--amber);font-family:'Space Mono',monospace}

/* Status line */
#status{position:absolute;bottom:20px;left:24px;font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:0.05em}

.credit{position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:10px;color:var(--muted);opacity:0.3;letter-spacing:0.15em;font-family:'Space Mono',monospace;pointer-events:none}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="app">
  <header>
    <h1>Crew Factory</h1>
    <div class="count" id="crew-count">crews assembled: 0</div>
  </header>
  <div class="main">
    <div id="title">
      <h2>Build your <span>crew</span></h2>
      <p>One button. Six specialists. Infinite possibilities.</p>
      <div class="btn-wrap">
        <button class="btn" id="assemble-btn">Assemble Crew</button>
      </div>
    </div>
    <div id="assembly">
      <div id="conveyor"></div>
      <div style="margin-top:24px">
        <button class="btn" id="again-btn">Assemble Another</button>
      </div>
    </div>
    <button id="gallery-btn" style="display:none">Gallery</button>
    <div id="gallery">
      <div class="gallery-header">
        <h3>Your Crews</h3>
        <button class="close" id="gallery-close">Close</button>
      </div>
      <div id="gallery-list"></div>
    </div>
    <div id="status"></div>
  </div>
</div>
<div class="credit">ystackai</div>
<script>
// ── Data ────────────────────────────────────────────────────────────
const FIRST_NAMES = [
  'Kai','Nova','Ash','Rune','Jett','Sage','Pike','Onyx','Luna','Blaze',
  'Cove','Wren','Zara','Finn','Nyx','Vale','Haze','Drift','Echo','Flint',
  'Iris','Lark','Moss','Opal','Pax','Quinn','Reed','Sol','Thorn','Vera',
  'Alder','Bryn','Cleo','Dusk','Elm','Fox','Gale','Heath','Ivy','Jade',
];
const LAST_NAMES = [
  'Steele','Voss','Mori','Chen','Nkomo','Okafor','Tanaka','Wolff','Park','Reyes',
  'Dubois','Nakamura','Kim','Johansson','Osei','Larsson','Patel','Cruz','Yamamoto','Kozlov',
];
const ROLES = ['Director','Lead Engineer','Engineer','Artist','Musician','Writer'];
const ROLE_COLORS = ['#ef4444','#3b82f6','#22d3ee','#a855f7','#f59e0b','#10b981'];
const TRAITS = [
  'Relentless optimist','Quiet perfectionist','Chaos navigator','Detail obsessed',
  'Midnight builder','Strategic thinker','Rapid prototyper','Vibe architect',
  'Deadline whisperer','Pattern breaker','Team glue','Wild card',
  'Scope slayer','Polish addict','Feature minimalist','Ship-it mentality',
];

// ── Audio ───────────────────────────────────────────────────────────
let audioCtx, masterGain;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  masterGain=audioCtx.createGain();masterGain.gain.value=0.25;
  masterGain.connect(audioCtx.destination);
}
function playMechanical(){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  // Clunk
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(80,t);o.frequency.exponentialRampToValueAtTime(30,t+0.1);
  g.gain.setValueAtTime(0.15,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.15);
  // Hiss
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.2,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,3);
  const n=audioCtx.createBufferSource();n.buffer=buf;
  const ng=audioCtx.createGain();ng.gain.value=0.08;
  n.connect(ng);ng.connect(masterGain);n.start(t+0.05);
}
function playCardReveal(i){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  const notes=[261.6,329.6,392,440,523.3,659.3];
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='sine';o.frequency.value=notes[i%notes.length];
  g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  o.connect(g);g.connect(masterGain);o.start(t);o.stop(t+0.4);
}
function playComplete(){
  if(!audioCtx)return;const t=audioCtx.currentTime;
  [523.3,659.3,784,1047].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.06,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.6);
    o.connect(g);g.connect(masterGain);o.start(t+i*0.1);o.stop(t+i*0.1+0.6);
  });
}
function startAmbient(){
  if(!audioCtx)return;
  const o1=audioCtx.createOscillator(),o2=audioCtx.createOscillator();
  const g=audioCtx.createGain(),f=audioCtx.createBiquadFilter();
  o1.type='sawtooth';o1.frequency.value=55;o2.type='sawtooth';o2.frequency.value=55.2;
  f.type='lowpass';f.frequency.value=200;f.Q.value=1;
  g.gain.value=0;g.gain.linearRampToValueAtTime(0.03,audioCtx.currentTime+3);
  o1.connect(f);o2.connect(f);f.connect(g);g.connect(masterGain);
  o1.start();o2.start();
  // LFO on filter
  const lfo=audioCtx.createOscillator(),lg=audioCtx.createGain();
  lfo.frequency.value=0.08;lg.gain.value=80;lfo.connect(lg);lg.connect(f.frequency);lfo.start();
}

// ── Avatar Generator ────────────────────────────────────────────────
function generateAvatar(seed,roleIndex){
  const c=document.createElement('canvas');c.width=112;c.height=112;
  const x=c.getContext('2d');
  const hue=(seed*137.5+roleIndex*60)%360;
  // Background
  const bg=x.createRadialGradient(56,50,10,56,56,56);
  bg.addColorStop(0,`hsl(${hue},40%,25%)`);bg.addColorStop(1,`hsl(${hue},30%,15%)`);
  x.fillStyle=bg;x.fillRect(0,0,112,112);
  // Head
  x.fillStyle=`hsl(${(hue+30)%360},25%,60%)`;
  x.beginPath();x.arc(56,42,22,0,Math.PI*2);x.fill();
  // Body
  x.fillStyle=`hsl(${hue},50%,40%)`;
  x.beginPath();x.ellipse(56,90,28,22,0,Math.PI,0);x.fill();
  // Eyes
  x.fillStyle='#fff';
  x.beginPath();x.arc(48,40,3,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(64,40,3,0,Math.PI*2);x.fill();
  x.fillStyle='#222';
  x.beginPath();x.arc(49,40,1.5,0,Math.PI*2);x.fill();
  x.beginPath();x.arc(65,40,1.5,0,Math.PI*2);x.fill();
  // Mouth
  x.strokeStyle=`hsl(${(hue+30)%360},25%,50%)`;x.lineWidth=1.5;
  x.beginPath();x.arc(56,48,6,0.1*Math.PI,0.9*Math.PI);x.stroke();
  // Role indicator dot
  x.fillStyle=ROLE_COLORS[roleIndex];
  x.beginPath();x.arc(90,90,8,0,Math.PI*2);x.fill();
  x.fillStyle='#fff';x.font='bold 8px sans-serif';x.textAlign='center';x.textBaseline='middle';
  x.fillText(ROLES[roleIndex][0],90,90);
  return c;
}

// ── State ───────────────────────────────────────────────────────────
let crews=[],crewCount=0,assembling=false;

function randomMember(roleIndex){
  const first=FIRST_NAMES[Math.floor(Math.random()*FIRST_NAMES.length)];
  const last=LAST_NAMES[Math.floor(Math.random()*LAST_NAMES.length)];
  const trait=TRAITS[Math.floor(Math.random()*TRAITS.length)];
  return{name:`${first} ${last}`,role:ROLES[roleIndex],trait,seed:Math.random()*1000|0,roleIndex};
}

function generateCrew(){
  return ROLES.map((_,i)=>randomMember(i));
}

// ── Assembly Animation ──────────────────────────────────────────────
async function assembleCrew(){
  if(assembling)return;
  assembling=true;
  initAudio();startAmbient();

  const title=document.getElementById('title');
  const assembly=document.getElementById('assembly');
  const conveyor=document.getElementById('conveyor');
  const status=document.getElementById('status');
  const againBtn=document.getElementById('again-btn');

  title.classList.add('exit');
  againBtn.style.display='none';
  conveyor.innerHTML='';

  await sleep(400);
  assembly.classList.add('active');
  playMechanical();
  status.textContent='initializing assembly line...';

  await sleep(600);
  const crew=generateCrew();

  for(let i=0;i<crew.length;i++){
    const m=crew[i];
    const card=document.createElement('div');
    card.className='card';

    const avatarDiv=document.createElement('div');
    avatarDiv.className='avatar';
    avatarDiv.appendChild(generateAvatar(m.seed,m.roleIndex));

    const nameDiv=document.createElement('div');
    nameDiv.className='name';nameDiv.textContent=m.name;

    const roleDiv=document.createElement('div');
    roleDiv.className='role';roleDiv.textContent=m.role;
    roleDiv.style.color=ROLE_COLORS[m.roleIndex];

    const traitDiv=document.createElement('div');
    traitDiv.className='trait';traitDiv.textContent=m.trait;

    card.append(avatarDiv,nameDiv,roleDiv,traitDiv);
    conveyor.appendChild(card);

    status.textContent=`assembling ${m.role.toLowerCase()}...`;
    playCardReveal(i);

    await sleep(120);
    card.classList.add('in');
    await sleep(280);
  }

  status.textContent='crew assembled.';
  playComplete();
  crewCount++;
  crews.push(crew);
  document.getElementById('crew-count').textContent=`crews assembled: ${crewCount}`;
  document.getElementById('gallery-btn').style.display='block';

  await sleep(500);
  againBtn.style.display='inline-block';
  assembling=false;
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// ── Gallery ─────────────────────────────────────────────────────────
function openGallery(){
  const list=document.getElementById('gallery-list');
  list.innerHTML='';
  crews.forEach((crew,i)=>{
    const row=document.createElement('div');
    row.className='crew-row';
    const label=document.createElement('div');
    label.className='crew-label';
    label.textContent=`Crew #${i+1}`;
    const cards=document.createElement('div');
    cards.className='crew-cards';
    crew.forEach(m=>{
      const mc=document.createElement('div');
      mc.className='mini-card';
      mc.innerHTML=`<div class="m-name">${m.name}</div><div class="m-role">${m.role}</div>`;
      cards.appendChild(mc);
    });
    row.append(label,cards);
    list.appendChild(row);
  });
  document.getElementById('gallery').classList.add('open');
}

// ── Background ──────────────────────────────────────────────────────
const bgCanvas=document.getElementById('bg');
const bgCtx=bgCanvas.getContext('2d');
let W,H;
function resizeBg(){
  W=window.innerWidth;H=window.innerHeight;
  bgCanvas.width=W;bgCanvas.height=H;
}
window.addEventListener('resize',resizeBg);resizeBg();

const gridParticles=[];
for(let i=0;i<40;i++){
  gridParticles.push({x:Math.random()*W,y:Math.random()*H,vy:-0.2-Math.random()*0.3,size:1+Math.random(),alpha:0.1+Math.random()*0.2});
}
function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  // Subtle grid
  bgCtx.strokeStyle='rgba(245,158,11,0.03)';bgCtx.lineWidth=0.5;
  const gs=60;
  for(let x=0;x<W;x+=gs){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke()}
  for(let y=0;y<H;y+=gs){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke()}
  // Floating particles
  for(const p of gridParticles){
    p.y+=p.vy;if(p.y<-10){p.y=H+10;p.x=Math.random()*W}
    bgCtx.fillStyle=`rgba(245,158,11,${p.alpha})`;
    bgCtx.fillRect(p.x,p.y,p.size,p.size);
  }
  requestAnimationFrame(drawBg);
}
drawBg();

// ── Events ──────────────────────────────────────────────────────────
document.getElementById('assemble-btn').addEventListener('click',assembleCrew);
document.getElementById('again-btn').addEventListener('click',assembleCrew);
document.getElementById('gallery-btn').addEventListener('click',openGallery);
document.getElementById('gallery-close').addEventListener('click',()=>{document.getElementById('gallery').classList.remove('open')});
</script>
</body>
</html>
