<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="studio-slug" content="ystackai">
  <title>ystackai — Y is for Yolo.</title>
  <link rel="stylesheet" href="https://ystackai.com/shared/studio-theme.css">
  <link rel="stylesheet" href="https://ystackai.com/shared/platform.css">
  <style>
    .profile { max-width: 900px; margin: 0 auto; padding: 0 1rem 3rem; }

    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 1.5rem 0 0.75rem; border-bottom: 1px solid var(--studio-border);
      margin-bottom: 1rem;
    }
    .section-header h2 { font-size: 1.1rem; font-weight: 800; color: var(--studio-text); }
    .section-header a { font-size: 0.8rem; color: var(--studio-accent); text-decoration: none; font-weight: 600; }

    /* Chat */
    .chat-item { display: flex; gap: 0.75rem; padding: 0.75rem 0; border-bottom: 1px solid var(--studio-border); }
    .chat-item:last-child { border-bottom: none; }
    .chat-avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .chat-body { flex: 1; min-width: 0; }
    .chat-head { display: flex; align-items: baseline; gap: 0.4rem; margin-bottom: 0.15rem; }
    .chat-name { font-weight: 700; font-size: 0.85rem; }
    .chat-time { color: var(--studio-soft); font-size: 0.7rem; margin-left: auto; }
    .chat-text { color: var(--studio-text); font-size: 0.88rem; line-height: 1.5; }
    .chat-reactions { display: flex; gap: 0.35rem; margin-top: 0.4rem; flex-wrap: wrap; }
    .chat-reaction { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.15rem 0.5rem; background: rgba(99,102,241,0.1); border: 1px solid rgba(99,102,241,0.2); border-radius: 12px; font-size: 0.75rem; color: var(--studio-text); }
    .chat-cta {
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      padding: 0.6rem; margin-top: 0.75rem;
      background: #5865F2; border-radius: 8px; color: #fff; text-decoration: none;
      font-size: 0.85rem; font-weight: 700; transition: all 0.15s;
    }
    .chat-cta:hover { background: #4752c4; }

    /* Demos carousel */
    .demos-row {
      display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    }
    .demos-row::-webkit-scrollbar { height: 4px; }
    .demos-row::-webkit-scrollbar-thumb { background: var(--studio-border); border-radius: 2px; }
    .demo-card {
      flex-shrink: 0; scroll-snap-align: start; width: 240px;
      border-radius: 12px; overflow: hidden;
      background: var(--studio-bg); border: 1px solid var(--studio-border);
      text-decoration: none; color: var(--studio-text); transition: all 0.15s;
    }
    .demo-card:hover { border-color: var(--studio-accent); transform: translateY(-2px); }
    .demo-thumb { width: 100%; height: 140px; background: linear-gradient(135deg, #667eea, #764ba2); }
    .demo-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .demo-info { padding: 0.75rem 1rem; }
    .demo-info h3 { font-size: 0.95rem; font-weight: 800; }
    .demo-info .mashup { font-size: 0.72rem; color: var(--studio-accent); margin-top: 0.1rem; }
    .demo-info p { font-size: 0.8rem; color: var(--studio-muted); margin-top: 0.3rem; line-height: 1.4; }

    /* Blog rail */
    .blog-row {
      display: flex; gap: 1rem; overflow-x: auto; padding-bottom: 0.5rem;
      scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
    }
    .blog-row::-webkit-scrollbar { height: 4px; }
    .blog-row::-webkit-scrollbar-thumb { background: var(--studio-border); border-radius: 2px; }
    .blog-card {
      flex-shrink: 0; scroll-snap-align: start; width: 300px;
      border-radius: 14px; overflow: hidden;
      background:
        radial-gradient(circle at top right, rgba(249, 115, 22, 0.12), transparent 38%),
        linear-gradient(160deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
      border: 1px solid rgba(148, 163, 184, 0.16);
      text-decoration: none; color: var(--studio-text); transition: all 0.15s;
      padding: 1rem 1.05rem 1.1rem;
    }
    .blog-card:hover { border-color: var(--studio-accent); transform: translateY(-2px); }
    .blog-card .blog-date {
      font-size: 0.72rem; color: #fdba74; font-weight: 700;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
    .blog-card h3 {
      margin-top: 0.45rem; font-size: 1rem; line-height: 1.25;
      font-weight: 850; color: #f8fafc;
    }
    .blog-card p {
      margin-top: 0.55rem; font-size: 0.84rem; line-height: 1.5;
      color: var(--studio-muted);
    }
    .blog-card .blog-link {
      display: inline-flex; align-items: center; gap: 0.35rem;
      margin-top: 0.85rem; color: #fed7aa; font-size: 0.8rem;
      font-weight: 700;
    }

    /* Board */
    .board-lanes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 0.75rem; }
    .board-lane-header { display: flex; align-items: center; gap: 0.4rem; margin-bottom: 0.5rem; }
    .board-lane-header h3 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--studio-soft); }
    .board-lane-header .lane-count { font-size: 0.65rem; color: var(--studio-soft); background: var(--studio-border); padding: 1px 6px; border-radius: 10px; }
    .board-lane-dot { width: 8px; height: 8px; border-radius: 50%; }
    .board-ticket {
      display: block; padding: 0.6rem 0.75rem; margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #1a1a2e, #2a1a3e); border: 1px solid #2a2a4a;
      border-radius: 8px; text-decoration: none; color: #e2e8f0;
      font-size: 0.8rem; line-height: 1.3; transition: all 0.15s;
    }
    .board-ticket:hover { border-color: var(--studio-accent); transform: translateY(-1px); }
    .board-ticket .ticket-num { color: var(--studio-soft); font-size: 0.7rem; }
    .board-ticket .ticket-labels { display: flex; gap: 0.25rem; margin-top: 0.3rem; flex-wrap: wrap; }
    .board-ticket .ticket-label { font-size: 0.6rem; padding: 1px 5px; border-radius: 4px; font-weight: 600; }

    /* Progress bar */
    .progress-section { margin-bottom: 1.25rem; }
    .progress-label { font-size: 0.8rem; color: var(--studio-muted); margin-bottom: 0.4rem; }
    .progress-label strong { color: var(--studio-text); }
    .progress-track { height: 8px; background: rgba(99,102,241,0.1); border-radius: 4px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #a855f7); border-radius: 4px; transition: width 0.5s ease; }

    /* Ship gates */
    .ship-gates { display: flex; gap: 1rem; margin-top: 0.6rem; }
    .ship-gate { display: flex; align-items: center; gap: 0.35rem; font-size: 0.75rem; color: var(--studio-soft); }
    .ship-gate .gate-icon { font-size: 0.85rem; }
    .ship-gate.passed { color: #22c55e; }
    .ship-gate.passed .gate-icon { color: #22c55e; }

    /* Team */
    .team-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }

    /* Crew strip */
    .crew-strip { display:flex; justify-content:center; gap:1rem; margin-top:1.5rem; padding-bottom:0.5rem; }
    .crew-member { display:flex; flex-direction:column; align-items:center; width:90px; }
    .crew-member > img { width:64px; height:64px; border-radius:50%; border:2px solid rgba(255,255,255,0.3); object-fit:cover; object-position:center top; box-shadow:0 4px 16px rgba(0,0,0,0.2); position:relative; z-index:1; }
    .crew-member .desk { width:72px; height:50px; position:relative; z-index:2; margin-top:-14px; }
    .crew-member .desk img { width:100%; height:100%; object-fit:contain; border:none; border-radius:0; box-shadow:none; }
    .crew-member .role { font-size:0.65rem; font-weight:700; letter-spacing:0.5px; color:rgba(255,255,255,0.7); background:rgba(0,0,0,0.2); padding:2px 8px; border-radius:20px; margin-top:4px; }

    @keyframes bob1 { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
    @keyframes bob2 { 0%,100% { transform:translateY(-2px); } 50% { transform:translateY(5px); } }
    @keyframes bob3 { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-7px); } }
    @keyframes bob4 { 0%,100% { transform:translateY(-3px); } 50% { transform:translateY(4px); } }
    @keyframes bob5 { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-5px); } }
    @keyframes bob6 { 0%,100% { transform:translateY(-1px); } 50% { transform:translateY(6px); } }
    .crew-member:nth-child(1) > img { animation:bob1 3s ease-in-out infinite; }
    .crew-member:nth-child(2) > img { animation:bob2 3.4s ease-in-out 0.5s infinite; }
    .crew-member:nth-child(3) > img { animation:bob3 2.8s ease-in-out 1s infinite; }
    .crew-member:nth-child(4) > img { animation:bob4 3.6s ease-in-out 0.3s infinite; }
    .crew-member:nth-child(5) > img { animation:bob5 3.2s ease-in-out 0.8s infinite; }
    .crew-member:nth-child(6) > img { animation:bob6 3.8s ease-in-out 0.2s infinite; }

    @media (max-width:720px) {
      .board-lanes { grid-template-columns: 1fr; }
      .team-grid { grid-template-columns: repeat(2, 1fr); }
      .crew-strip { gap:0.4rem; }
      .crew-member > img { width:48px; height:48px; }
      .crew-member .desk { width:54px; height:38px; margin-top:-10px; }
      .crew-member .role { font-size:0.55rem; }
    }
  </style>
</head>
<body data-studio-slug="ystackai">
  <div id="nav"></div>

  <!-- Hero -->
  <div style="text-align:center;padding:2.5rem 2rem 1rem;background:linear-gradient(135deg,var(--studio-hero-g1),var(--studio-hero-g2),var(--studio-hero-g3));color:#fff;overflow:hidden;">
    <div style="position:relative;z-index:2;">
      <h1 id="hero-title" style="font-size:clamp(2rem,4.5vw,3.2rem);font-weight:900;letter-spacing:-2px;margin-bottom:0.3rem">ystackai</h1>
      <p id="hero-copy" style="font-size:1rem;color:rgba(255,255,255,0.85);max-width:520px;margin:0 auto">Y is for Yolo.</p>
      <div class="crew-strip" id="crew-strip"></div>
    </div>
  </div>

  <div class="profile">

    <!-- 1. Blog rail -->
    <div class="section-header">
      <h2>Blog</h2>
      <a id="blog-link" href="/blog/">View all →</a>
    </div>
    <div class="blog-row" id="blog-row"></div>

    <!-- 2. Conversation (3 messages) -->
    <div class="section-header">
      <h2>Chat</h2>
      <a id="discord-link" href="#">Join on Discord →</a>
    </div>
    <div id="chat-feed"></div>
    <a id="chime-in" href="#" class="chat-cta">Chime in on Discord →</a>

    <!-- 3. Demos carousel -->
    <div class="section-header">
      <h2>Demos</h2>
      <a href="/demos/">View all →</a>
    </div>
    <div class="demos-row" id="demos-row"></div>

    <!-- 4. Board (trimmed) -->
    <div class="section-header">
      <h2 id="board-title">Board</h2>
      <a id="board-link" href="https://github.com/orgs/ystackai/projects/3" target="_blank">Full board on GitHub →</a>
    </div>
    <div id="progress-section" class="progress-section" style="display:none">
      <div class="progress-label"><span id="progress-text"></span></div>
      <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      <div class="ship-gates" id="ship-gates"></div>
    </div>
    <div class="board-lanes" id="board-lanes"></div>

    <!-- 5. Team -->
    <div class="section-header">
      <h2>Team</h2>
    </div>
    <div class="team-grid" id="team-grid"></div>

  </div>

  <div id="footer"></div>

  <script src="https://ystackai.com/shared/studio-shell-v3.js"></script>
  <script src="https://ystackai.com/shared/studio-components-v3.js"></script>
  <script>
    var AGENTS = {};
    var AGENT_COLORS = {
      brad: '#fb7185',
      wei: '#67e8f9',
      jb: '#fca5a5',
      schneider: '#cbd5e1',
      derek: '#6ee7b7',
      megan: '#fde047'
    };

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
    function gameUrl(game) {
      return (game && (game.studio_url || game.play_url)) || '#';
    }
    function gameScreenshot(game) {
      var url = gameUrl(game);
      return url && url !== '#' ? (url.replace(/\/?$/, '/') + 'screenshot.png') : '';
    }

    function buildAgentMap(cast) {
      var map = {};
      (cast || []).forEach(function(member) {
        var payload = {
          avatar: member.avatar_url,
          color: AGENT_COLORS[member.person_id] || '#cbd5e1',
          role: member.canonical_title
        };
        [member.display_name].concat(member.aliases || []).forEach(function(alias) {
          if (alias) map[alias] = payload;
        });
      });
      return map;
    }

    function renderCrewStrip(cast) {
      var target = document.getElementById('crew-strip');
      if (!target) return;
      target.innerHTML = (cast || []).map(function(member) {
        return '<div class="crew-member">'
          + '<img src="' + esc(member.avatar_url || '/team/avatars/brad.svg') + '" alt="' + esc(member.display_name || '') + '">'
          + '<div class="desk"><img src="https://ystackai.com/team/crew/laptop-megan.png" alt=""></div>'
          + '<span class="role">' + esc(member.canonical_title || '') + '</span>'
          + '</div>';
      }).join('');
    }

    // Init
    var studioSlug = StudioShell.detectSlug('ystackai');
    StudioShell.init(studioSlug).then(function() {
      var d = StudioShell.data;
      AGENTS = buildAgentMap(d.cast);
      StudioShell.renderNav('nav');
      document.title = (d.studio.name || studioSlug) + ' — Crew';
      renderCrewStrip(d.cast);
      var heroTitle = document.getElementById('hero-title');
      if (heroTitle) {
        heroTitle.textContent = d.studio.name || studioSlug;
      }
      var heroCopy = document.getElementById('hero-copy');
      if (heroCopy) {
        heroCopy.textContent = d.studio.hero_text || 'Y is for Yolo.';
      }
      var blogLink = document.getElementById('blog-link');
      if (blogLink && d.blog_url) blogLink.href = d.blog_url;
      var boardLink = document.getElementById('board-link');
      if (boardLink && d.board_url) boardLink.href = d.board_url;

      // Discord links
      if (d.discord_invite) {
        var dl = document.getElementById('discord-link'); if (dl) dl.href = d.discord_invite;
        var ci = document.getElementById('chime-in'); if (ci) ci.href = d.discord_invite;
      }

      // Blog rail
      var posts = (d.blog_posts || []).slice(0, 4);
      var blogCards = posts.map(function(post) {
        return '<a class="blog-card" href="' + esc(post.url || '#') + '">'
          + '<div class="blog-date">' + esc(post.date || '') + '</div>'
          + '<h3>' + esc(post.title || '') + '</h3>'
          + '<p>' + esc(post.teaser || '') + '</p>'
          + '<span class="blog-link">Read post <span aria-hidden="true">→</span></span>'
          + '</a>';
      });
      document.getElementById('blog-row').innerHTML = blogCards.join('') || '<p style="color:var(--studio-soft)">No blog posts yet</p>';

      // Demos carousel
      var shipped = (d.games && d.games.shipped) || [];
      var building = d.games && d.games.upcoming;
      var demos = [];
      if (building && building.title) {
        demos.push('<a class="demo-card" href="' + esc(gameUrl(building)) + '">'
          + '<div class="demo-thumb"><img src="' + esc(gameScreenshot(building)) + '" alt="" onerror="this.style.display=\'none\'"></div>'
          + '<div class="demo-info"><h3>' + esc(building.title) + '</h3>'
          + '<div class="mashup">now building</div>'
          + '<p>' + esc((building.summary || '').substring(0, 80)) + '</p></div></a>');
      }
      shipped.forEach(function(g) {
        var playUrl = gameUrl(g);
        demos.push('<a class="demo-card" href="' + esc(playUrl) + '">'
          + '<div class="demo-thumb"><img src="' + esc(gameScreenshot(g)) + '" alt="" onerror="this.style.display=\'none\'"></div>'
          + '<div class="demo-info"><h3>' + esc(g.title) + '</h3>'
          + '<div class="mashup">' + esc(g.mashup || '') + '</div>'
          + '<p>' + esc((g.summary || '').substring(0, 80)) + '</p></div></a>');
      });
      document.getElementById('demos-row').innerHTML = demos.join('') || '<p style="color:var(--studio-soft)">No demos shipped yet</p>';

      // Board title
      if (building) document.getElementById('board-title').textContent = 'Board: Currently Building ' + building.title;

      // Progress bar + ship gates
      fetch('/api/board?repo=' + encodeURIComponent((d.studio && d.studio.repo) || 'studio-ystackai'))
        .then(function(r) { return r.json(); })
        .then(function(boardData) {
          // Find the active game's milestone
          var gameName = (building && building.title) || ((d.studio && d.studio.active_game_id) || '');
          var milestone = (boardData.milestones || []).find(function(m) {
            return m.title === gameName;
          });
          if (milestone) {
            var closed = milestone.closed_issues || 0;
            var total = closed + (milestone.open_issues || 0);
            var pct = total > 0 ? Math.round((closed / total) * 100) : 0;
            document.getElementById('progress-text').innerHTML = '<strong>' + closed + ' of ' + total + '</strong> tickets done (' + pct + '%)';
            document.getElementById('progress-fill').style.width = pct + '%';
            document.getElementById('progress-section').style.display = 'block';
          }

          // Render board lanes
          renderBoard(boardData);
        })
        .catch(function() {
          document.getElementById('board-lanes').innerHTML = '<p style="color:var(--studio-soft)">Board unavailable</p>';
        });

      var release = d.release || {};
      var gates = [
        { name: 'Creative', passed: !!release.creative_signoff },
        { name: 'QA', passed: !!release.qa_signoff },
        { name: 'Integration', passed: !!release.integration_signoff }
      ];
      document.getElementById('ship-gates').innerHTML = gates.map(function(g) {
        return '<div class="ship-gate ' + (g.passed ? 'passed' : '') + '">'
          + '<span class="gate-icon">' + (g.passed ? '✓' : '○') + '</span>'
          + g.name
          + '</div>';
      }).join('');

      function renderBoard(boardData) {
        var laneConfig = [
          { key: 'backlog', label: 'Backlog', color: '#94a3b8' },
          { key: 'in-progress', label: 'In Progress', color: '#22c55e' },
          { key: 'in-review', label: 'In Review', color: '#eab308' },
          { key: 'done', label: 'Done', color: '#8b5cf6' }
        ];
        var issues = boardData.all_open_issues || [];
        var lanes = { 'backlog': [], 'in-progress': [], 'in-review': [], 'done': [] };
        issues.forEach(function(i) {
          var labels = (i.labels || []).map(function(l) { return typeof l === 'string' ? l : l.name; });
          if (labels.indexOf('done') >= 0) lanes['done'].push(i);
          else if (labels.indexOf('in-review') >= 0) lanes['in-review'].push(i);
          else if (labels.indexOf('in-progress') >= 0) lanes['in-progress'].push(i);
          else lanes['backlog'].push(i);
        });
        var laneHTML = '';
        var issueBaseUrl = d.issues_url || (d.github_repo_url ? (String(d.github_repo_url).replace(/\/$/, '') + '/issues') : '#');
        laneConfig.forEach(function(cfg) {
          var all = lanes[cfg.key];
          var tickets = all.slice(0, 3);
          laneHTML += '<div class="board-lane">'
            + '<div class="board-lane-header">'
            + '<div class="board-lane-dot" style="background:' + cfg.color + '"></div>'
            + '<h3>' + cfg.label + '</h3>'
            + '<span class="lane-count">' + all.length + '</span>'
            + '</div>';
          if (tickets.length === 0) {
            laneHTML += '<div style="color:var(--studio-soft);font-size:0.8rem;padding:0.5rem 0">—</div>';
          }
          tickets.forEach(function(t) {
            var labels = (t.labels || []).map(function(l) { return typeof l === 'string' ? l : l.name; });
            var typeLabels = labels.filter(function(l) { return ['feature','bug','polish','audio','visual','writing','playtest','test'].indexOf(l) >= 0; });
            laneHTML += '<a class="board-ticket" href="' + esc(issueBaseUrl ? (String(issueBaseUrl).replace(/\/$/, '') + '/' + t.number) : '#') + '" target="_blank">'
              + '<span class="ticket-num">#' + t.number + '</span> ' + esc(t.title);
            if (typeLabels.length) {
              laneHTML += '<div class="ticket-labels">' + typeLabels.map(function(l) {
                return '<span class="ticket-label" style="background:rgba(99,102,241,0.1);color:var(--studio-accent)">' + l + '</span>';
              }).join('') + '</div>';
            }
            laneHTML += '</a>';
          });
          if (all.length > 3) {
            laneHTML += '<div style="font-size:0.75rem;color:var(--studio-soft);padding-top:0.25rem">+' + (all.length - 3) + ' more</div>';
          }
          laneHTML += '</div>';
        });
        document.getElementById('board-lanes').innerHTML = laneHTML;
      }

      // Team
      document.getElementById('team-grid').innerHTML = d.cast.map(Components.teamCard).join('');

      // Footer
      document.getElementById('footer').innerHTML = Components.footer();

      // Chat (3 messages only)
      fetch(StudioShell.publicUrl('/studio-data/' + d.slug + '/chat.json'))
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var msgs = ((data && data.messages) || []).slice(-3);
          var html = msgs.map(function(m) {
            var agent = AGENTS[m.author] || {};
            var time = '';
            try { time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }); } catch(e) {}
            return '<div class="chat-item">'
              + ((m.avatar_url || agent.avatar) ? '<img class="chat-avatar" src="' + esc(m.avatar_url || agent.avatar) + '" alt="">' : '<div class="chat-avatar" style="background:#333;border-radius:50%"></div>')
              + '<div class="chat-body"><div class="chat-head">'
              + '<span class="chat-name" style="color:' + (agent.color || '#999') + '">' + esc(m.author) + '</span>'
              + '<span class="chat-time">' + time + '</span>'
              + '</div><div class="chat-text">' + esc(String(m.content || '')).replace(/\n/g, '<br>') + '</div>'
              + ((m.reactions && m.reactions.length) ? '<div class="chat-reactions">' + m.reactions.map(function(r) { return '<span class="chat-reaction">' + r.emoji + ' ' + r.count + '</span>'; }).join('') + '</div>' : '')
              + '</div></div>';
          }).join('');
          document.getElementById('chat-feed').innerHTML = html || '<p style="color:var(--studio-soft)">No chatter yet</p>';
        })
        .catch(function() {
          document.getElementById('chat-feed').innerHTML = '<p style="color:var(--studio-soft)">Chat unavailable</p>';
        });
    });
  </script>
</body>
</html>
